<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UBT OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#020617;
  --surface:#0f172a;
  --surface2:#1e293b;
  --surface3:#263348;
  --border:#1e3352;
  --border2:#2d4268;
  --text:#f8fafc;
  --muted:#94a3b8;
  --faint:#475569;
  --green:#22c55e;
  --green-dim:rgba(34,197,94,.12);
  --blue:#3b82f6;
  --blue-dim:rgba(59,130,246,.12);
  --indigo:#6366f1;
  --amber:#f59e0b;
  --amber-dim:rgba(245,158,11,.12);
  --red:#ef4444;
  --red-dim:rgba(239,68,68,.12);
  --pink:#ec4899;
  --mono:'Fira Code',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Fira Sans',-apple-system,sans-serif;font-size:13px;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;}

/* ── SIDEBAR ── */
.sidebar{width:220px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;position:sticky;top:0;}
.sb-logo{padding:20px 18px 16px;border-bottom:1px solid var(--border);}
.sb-logo .mark{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--green);letter-spacing:.18em;text-shadow:0 0 12px rgba(34,197,94,.3);}
.sb-logo .sub{font-size:9.5px;color:var(--faint);letter-spacing:.14em;margin-top:4px;text-transform:uppercase;}
.sb-nav{flex:1;padding:10px 8px;overflow-y:auto;}
.nav-item{display:flex;align-items:center;gap:9px;width:100%;padding:8px 10px;border-radius:8px;cursor:pointer;color:var(--faint);font-size:12px;font-weight:500;background:none;border:none;text-align:left;font-family:inherit;transition:background .15s,color .15s;}
.nav-item:hover{background:var(--surface2);color:var(--muted);}
.nav-item.active{background:linear-gradient(90deg,rgba(99,102,241,.15),rgba(59,130,246,.08));color:var(--text);border-left:2px solid var(--indigo);padding-left:8px;}
.nav-item .ni{width:16px;text-align:center;font-size:13px;}
.sb-user{padding:14px 18px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.sb-user .ava{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#3b82f6);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;box-shadow:0 0 10px rgba(99,102,241,.3);}
.sb-user .info{flex:1;min-width:0;}
.sb-user .name{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb-user .role{font-size:10px;color:var(--faint);}
.pulse-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;animation:pulse 2s infinite;box-shadow:0 0 6px rgba(34,197,94,.5);}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.5);}50%{box-shadow:0 0 0 5px rgba(34,197,94,0);}}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;min-height:100vh;overflow:hidden;}

/* TOPBAR */
.topbar{height:56px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:14px;background:rgba(15,23,42,.8);backdrop-filter:blur(12px);flex-shrink:0;position:sticky;top:0;z-index:10;}
.topbar .greet{flex:1;font-size:14px;font-weight:600;color:var(--text);}
.topbar .greet span{color:var(--muted);font-weight:400;}
.search{background:var(--surface2);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;gap:8px;padding:6px 12px;color:var(--faint);font-size:12px;width:200px;transition:border-color .2s;}
.search:focus-within{border-color:var(--indigo);}
.search input{background:none;border:none;outline:none;color:var(--muted);font-size:12px;width:100%;font-family:inherit;}
.tb-icon{width:32px;height:32px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:14px;transition:border-color .15s,color .15s;}
.tb-icon:hover{border-color:var(--border2);color:var(--text);}
.tb-ava{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#3b82f6);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;cursor:pointer;box-shadow:0 0 10px rgba(99,102,241,.25);}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:22px 24px 48px;}

/* SECTIONS */
.section{display:none;}
.section.active{display:block;}

/* KPI ROW */
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px;}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden;transition:border-color .2s,box-shadow .2s;cursor:default;}
.kpi:hover{border-color:var(--border2);box-shadow:0 0 20px rgba(59,130,246,.06);}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent,var(--blue));}
.kpi .k-label{font-size:10px;color:var(--faint);letter-spacing:.07em;text-transform:uppercase;margin-bottom:8px;font-weight:500;}
.kpi .k-val{font-size:24px;font-weight:700;font-family:var(--mono);color:var(--text);line-height:1;text-shadow:0 0 20px rgba(248,250,252,.08);}
.kpi .k-sub{font-size:10.5px;color:var(--muted);margin-top:5px;}
.kpi .k-badge{position:absolute;top:12px;right:12px;font-size:9px;padding:2px 7px;border-radius:5px;font-weight:600;letter-spacing:.05em;}
.badge-green{background:var(--green-dim);color:var(--green);}
.badge-amber{background:var(--amber-dim);color:var(--amber);}
.badge-red{background:var(--red-dim);color:var(--red);}
.badge-blue{background:var(--blue-dim);color:var(--blue);}

/* TWO PANE */
.two-pane{display:grid;grid-template-columns:1fr 320px;gap:16px;margin-bottom:16px;}
.three-pane{display:grid;grid-template-columns:260px 1fr 280px;gap:16px;margin-bottom:16px;}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:14px;transition:border-color .2s;}
.card:hover{border-color:var(--border2);}
.card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.card-title{font-size:10.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
.card-sub{font-size:10.5px;color:var(--faint);}

/* PROJECT CARDS */
.projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:16px;}
.proj-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:border-color .2s,background .2s,box-shadow .2s;position:relative;overflow:hidden;}
.proj-card:hover{border-color:var(--border2);background:var(--surface2);box-shadow:0 0 24px rgba(59,130,246,.07);}
.proj-card .pc-accent{position:absolute;top:0;left:0;bottom:0;width:3px;border-radius:10px 0 0 10px;}
.proj-card .pc-name{font-size:13.5px;font-weight:600;color:var(--text);margin-bottom:4px;padding-left:10px;}
.proj-card .pc-cat{font-size:11px;color:var(--faint);padding-left:10px;margin-bottom:12px;}
.proj-card .pc-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding-left:10px;}
.proj-card .ps{text-align:center;}
.proj-card .ps-val{font-size:15px;font-weight:700;font-family:var(--mono);}
.proj-card .ps-label{font-size:9.5px;color:var(--faint);margin-top:2px;}

/* AGENT LIST */
.agent-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);}
.agent-row:last-child{border-bottom:none;}
.agent-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.agent-name{flex:1;font-size:12px;color:var(--text);}
.agent-meta{font-size:10.5px;color:var(--faint);}
.agent-badge{font-size:9.5px;padding:2px 7px;border-radius:5px;font-weight:600;}

/* ACTIVITY FEED */
.feed-item{display:flex;gap:9px;padding:8px 0;border-bottom:1px solid var(--border);}
.feed-item:last-child{border-bottom:none;}
.feed-icon{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;margin-top:1px;}
.feed-body{flex:1;min-width:0;}
.feed-title{font-size:12px;color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.feed-time{font-size:10.5px;color:var(--faint);margin-top:2px;}

/* SYSTEM MAP */
.sys-map{display:flex;flex-direction:column;gap:8px;align-items:center;padding:8px 0;}
.map-row{display:flex;gap:12px;justify-content:center;}
.map-node{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:6px 14px;font-size:11px;font-weight:600;color:var(--text);cursor:default;transition:border-color .2s,box-shadow .2s;}
.map-node:hover{border-color:var(--blue);box-shadow:0 0 12px rgba(59,130,246,.12);}
.map-node.hub{background:linear-gradient(135deg,rgba(99,102,241,.18),rgba(59,130,246,.12));border-color:var(--indigo);color:#a5b4fc;box-shadow:0 0 16px rgba(99,102,241,.12);}
.map-node.ok{border-color:rgba(34,197,94,.4);box-shadow:0 0 10px rgba(34,197,94,.07);}
.map-arrow{color:var(--faint);font-size:16px;text-align:center;}

/* TG ACCOUNT MANAGER */
.tg-toolbar{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap;}
.tg-toolbar select,.tg-toolbar input[type=text]{background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--muted);font-size:12px;padding:5px 10px;font-family:inherit;outline:none;cursor:pointer;}
.tg-toolbar select:focus{border-color:var(--indigo);}
.tg-toolbar .sep{flex:1;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:7px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;border:none;transition:opacity .15s;}
.btn:hover{opacity:.85;}
.btn-primary{background:var(--indigo);color:#fff;}
.btn-ghost{background:var(--surface2);border:1px solid var(--border);color:var(--muted);}
.btn-danger{background:var(--red-dim);border:1px solid rgba(239,68,68,.3);color:var(--red);}
.btn-sm{padding:3px 10px;font-size:11px;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.tg-group{border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden;}
.tg-group-head{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface2);cursor:pointer;user-select:none;}
.tg-group-head:hover{background:var(--surface3);}
.tg-group-label{font-size:11.5px;font-weight:600;color:var(--text);flex:1;}
.tg-group-meta{font-size:10.5px;color:var(--faint);}
.tg-group-arrow{font-size:11px;color:var(--faint);transition:transform .2s;}
.tg-group-arrow.open{transform:rotate(90deg);}
.tg-group-body{border-top:1px solid var(--border);}
.tg-row{display:grid;grid-template-columns:auto 160px 90px 55px 80px 60px 1fr;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--border);transition:background .15s;}
.tg-row:last-child{border-bottom:none;}
.tg-row:hover{background:rgba(255,255,255,.02);}
.tg-row .acc-phone{font-family:var(--mono);font-size:12px;color:var(--text);}
.tg-row .acc-actions{display:flex;gap:5px;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:200;display:flex;align-items:center;justify-content:center;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:24px;width:440px;max-width:95vw;max-height:90vh;overflow-y:auto;}
.modal h3{font-size:14px;font-weight:700;margin-bottom:18px;color:var(--text);}
.form-row{margin-bottom:12px;}
.form-row label{display:block;font-size:11px;color:var(--faint);margin-bottom:5px;letter-spacing:.04em;text-transform:uppercase;}
.form-row input,.form-row select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;padding:8px 10px;font-family:inherit;outline:none;}
.form-row input:focus,.form-row select:focus{border-color:var(--indigo);}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}
.step-indicator{display:flex;gap:6px;margin-bottom:18px;}
.step-dot{width:8px;height:8px;border-radius:50%;background:var(--border2);}
.step-dot.active{background:var(--indigo);}
.step-dot.done{background:var(--green);}
.msg-ok{font-size:12px;color:var(--green);margin-top:8px;}
.msg-err{font-size:12px;color:var(--red);margin-top:8px;}

/* ALERT ITEMS */
.alert-item{display:flex;gap:9px;padding:8px;border-radius:8px;margin-bottom:7px;}
.alert-item:last-child{margin-bottom:0;}
.alert-item.warn{background:var(--amber-dim);border:1px solid rgba(245,158,11,.2);}
.alert-item.info{background:var(--blue-dim);border:1px solid rgba(59,130,246,.2);}
.alert-item.ok{background:var(--green-dim);border:1px solid rgba(34,197,94,.2);}
.alert-icon{font-size:16px;flex-shrink:0;}
.alert-text{font-size:11.5px;color:var(--text);}
.alert-sub{font-size:10.5px;color:var(--muted);margin-top:2px;}

/* TABLE */
table{width:100%;border-collapse:collapse;}
th{text-align:left;font-size:10px;color:var(--faint);font-weight:500;letter-spacing:.06em;padding:0 10px 8px 0;border-bottom:1px solid var(--border);text-transform:uppercase;}
td{font-size:12px;color:var(--muted);padding:8px 10px 8px 0;border-bottom:1px solid var(--border);}
tr:last-child td{border-bottom:none;}
td.hi{color:var(--text);font-weight:600;}
td.mono{font-family:var(--mono);font-size:11.5px;}

/* TAGS */
.live{font-size:8.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--green);border:1px solid rgba(34,197,94,.3);background:var(--green-dim);padding:2px 6px;border-radius:4px;margin-left:6px;}
.ref{font-size:8.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);border:1px solid var(--border);padding:2px 6px;border-radius:4px;margin-left:6px;}

/* STAT GRID */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:14px 16px;transition:border-color .2s;}
.stat:hover{border-color:var(--border2);}
.stat .sl{font-size:10px;color:var(--faint);letter-spacing:.06em;text-transform:uppercase;margin-bottom:7px;font-weight:500;}
.stat .sv{font-size:24px;font-weight:700;font-family:var(--mono);text-shadow:0 0 16px rgba(248,250,252,.07);}
.stat .sn{font-size:10.5px;color:var(--faint);margin-top:4px;}

/* CHAT */
.chat-log{max-height:340px;overflow-y:auto;display:flex;flex-direction:column;gap:7px;margin-bottom:12px;}
.chat-msg{padding:9px 13px;border-radius:10px;font-size:12.5px;max-width:82%;line-height:1.55;}
.chat-msg.user{background:linear-gradient(135deg,var(--indigo),#4f46e5);color:#fff;align-self:flex-end;box-shadow:0 2px 12px rgba(99,102,241,.25);}
.chat-msg.assistant{background:var(--surface2);border:1px solid var(--border2);color:var(--text);align-self:flex-start;}

/* NOTE */
.note{font-size:12.5px;color:var(--muted);line-height:1.65;}
.note b{color:var(--text);}
.note code{font-family:var(--mono);font-size:11px;background:var(--surface2);padding:1px 5px;border-radius:4px;color:#93c5fd;}

/* CHIP */
.chip{display:inline-block;font-size:10px;padding:2px 8px;border-radius:5px;font-weight:600;}

/* PRIORITY */
.pri-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:12.5px;color:var(--muted);}
.pri-item:last-child{border-bottom:none;}
.pri-num{color:var(--green);font-family:var(--mono);flex-shrink:0;font-size:11px;}

/* PROJECT WORKSPACE */
textarea{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px;font-family:inherit;font-size:13px;resize:vertical;outline:none;}
textarea:focus{border-color:var(--indigo);}
button.send-btn{background:var(--indigo);color:#fff;border:none;border-radius:8px;padding:0 18px;font-size:13px;cursor:pointer;font-family:inherit;}
button.send-btn:disabled{opacity:.5;cursor:not-allowed;}

@media(max-width:900px){
  .sidebar{width:52px;}
  .sb-logo .sub,.sb-user .info,.nav-item span:not(.ni){display:none;}
  .sb-logo .mark{font-size:10px;letter-spacing:.05em;}
  .kpi-row{grid-template-columns:repeat(2,1fr);}
  .three-pane{grid-template-columns:1fr;}
  .two-pane{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sb-logo">
    <div class="mark">UBT OS</div>
    <div class="sub">TRAFFIC SYSTEM</div>
  </div>
  <nav class="sb-nav" id="nav"></nav>
  <div class="sb-user">
    <div class="ava">СП</div>
    <div class="info">
      <div class="name">Сергей</div>
      <div class="role">decision-maker</div>
    </div>
    <div class="pulse-dot"></div>
  </div>
</aside>

<!-- MAIN -->
<div class="main">
  <!-- TOPBAR -->
  <div class="topbar">
    <div class="greet" id="greet">Загрузка… <span></span></div>
    <div class="search">
      <span>🔍</span>
      <input placeholder="Поиск по системе…" readonly>
    </div>
    <div class="tb-icon" title="Уведомления" id="notif-btn">🔔</div>
    <div class="tb-ava" title="Профиль">СП</div>
  </div>

  <!-- CONTENT -->
  <div class="content">
    <div class="section active" id="sec-dashboard"></div>
    <div class="section" id="sec-accounts"></div>
    <div class="section" id="sec-content"></div>
    <div class="section" id="sec-compliance"></div>
    <div class="section" id="sec-pipeline"></div>
    <div class="section" id="sec-clients"></div>
    <div class="section" id="sec-agents"></div>
    <div class="section" id="sec-analytics"></div>
    <div class="section" id="sec-telegram"></div>
    <div class="section" id="sec-infra"></div>
    <div class="section" id="sec-knowledge"></div>
  </div>
</div>

<script>
// ─── CONFIG ────────────────────────────────────────
const SUPABASE_URL = "https://ricuoztdelapexfpqsux.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_f_z6goLZoPN68j2N71wX6g_r6jNjrJt";
const AGENTS = "http://88.218.121.108:8080";
// ───────────────────────────────────────────────────

const SB_HEADERS = { apikey: SUPABASE_ANON_KEY, Authorization: "Bearer " + SUPABASE_ANON_KEY };

function esc(s){ return s==null?"":String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function live(){ return `<span class="live">live</span>`; }
function ref(){ return `<span class="ref">справка</span>`; }
function chip(t,c){ return `<span class="chip" style="background:${c}1a;color:${c}">${esc(t)}</span>`; }

async function ft(url, opts={}, ms=6000){
  const c=new AbortController(), id=setTimeout(()=>c.abort(),ms);
  try{ return await fetch(url,{...opts,signal:c.signal}); }finally{ clearTimeout(id); }
}
async function count(tbl,q=""){
  try{
    const r=await ft(`${SUPABASE_URL}/rest/v1/${tbl}?select=id${q}`,{headers:{...SB_HEADERS,Prefer:"count=exact"}});
    const rng=r.headers.get("content-range");
    return rng?parseInt(rng.split("/")[1]||"0",10):0;
  }catch(e){return 0;}
}
async function rows(tbl,q){
  try{const r=await ft(`${SUPABASE_URL}/rest/v1/${tbl}?${q}`,{headers:SB_HEADERS});return r.ok?await r.json():[];}catch(e){return [];}
}
async function health(){
  try{const r=await ft(`${AGENTS}/health/check-all`,{},10000);return r.ok?await r.json():null;}catch(e){return null;}
}

// ─── GREETING ──────────────────────────────────────
function greetText(){
  const h=new Date().getHours();
  if(h<6)return "Доброй ночи";
  if(h<12)return "Доброе утро";
  if(h<17)return "Добрый день";
  return "Добрый вечер";
}
document.getElementById("greet").innerHTML =
  `${greetText()}, Сергей 👋 <span style="font-size:13px;font-weight:400;color:var(--faint)">· UBT OS v2 · Sprint 2</span>`;

// ─── NAV ───────────────────────────────────────────
const NAV=[
  {id:"dashboard", icon:"⚡", label:"Главная"},

];

document.getElementById("nav").innerHTML = NAV.map(n =>
  `<button class="nav-item${n.id==="dashboard"?" active":""}" data-id="${n.id}">
    <span class="ni">${n.icon}</span><span>${n.label}</span>
  </button>`
).join("");

document.querySelectorAll(".nav-item").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".nav-item").forEach(b=>b.classList.remove("active"));
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("sec-"+btn.dataset.id).classList.add("active");
  });
});

async function renderCompliance(){
  let res = null;
  try{
    const r = await ft(`${AGENTS}/compliance/check`,{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({text:"This product guarantees cure",vertical:"nutra",geo:"PL"})
    },5000);
    res = r.ok ? await r.json() : null;
  }catch(e){}

  const vcolor = v => v==="pass"?"var(--green)":v==="warn"?"var(--amber)":"var(--red)";

  document.getElementById("sec-compliance").innerHTML = `
    <div class="stat-grid">
      <div class="stat">
        <div class="sl">Gate статус ${live()}</div>
        <div class="sv" style="color:${res?"var(--green)":"var(--red)"}">${res?"ONLINE":"OFFLINE"}</div>
        <div class="sn">POST /compliance/check</div>
      </div>
      <div class="stat">
        <div class="sl">Тест-запрос ${live()}</div>
        <div class="sv" style="color:${res?vcolor(res.verdict):"var(--faint)"}">${res?res.verdict.toUpperCase():"—"}</div>
        <div class="sn">${res?esc(res.reason):"нет ответа"}</div>
      </div>
    </div>
    <div class="card">
      <div class="card-head"><span class="card-title">Архитектура</span><span class="card-sub">${ref()}</span></div>
      <table><tr><th>Шаг</th><th>Метод</th><th>Время</th></tr>
        <tr><td class="hi">1. Regex</td><td>Словари бан-слов GEO × вертикаль</td><td class="mono">~0ms</td></tr>
        <tr><td class="hi">2. LLM</td><td>Haiku — edge cases и тексты &gt;200 символов</td><td class="mono">~1–2s</td></tr>
      </table>
    </div>
    <div class="card">
      <div class="card-head"><span class="card-title">Покрытие</span><span class="card-sub">${ref()}</span></div>
      <table><tr><th>Вертикаль</th><th>GEO</th><th>Проверка</th></tr>
        <tr><td class="hi">Nutra</td><td>PL, RO, MX, BR, IN</td><td>Медицинские claims + локальные бан-слова</td></tr>
        <tr><td class="hi">Betting</td><td>RU, KZ</td><td>Гарантии выигрыша, несовершеннолетние</td></tr>
      </table>
    </div>
    <div class="card">
      <div class="card-head"><span class="card-title">Интеграция в n8n</span><span class="card-sub">${ref()}</span></div>

    </div>
    <div class="card">
      <div class="card-head"><span class="card-title">💬 Чат с оркестратором ${live()}</span></div>
      <div class="chat-log" id="chat-log">
        ${hist.map(m=>`<div class="chat-msg ${m.role}">${esc(m.content)}</div>`).join("")}
      </div>
      <div style="display:flex;gap:8px;">
        <textarea id="chat-input" rows="2" placeholder="Спроси оркестратора об этом проекте…" style="flex:1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat();}"></textarea>
        <button type="button" class="send-btn" id="chat-send" onclick="sendChat()">Отправить</button>
      </div>
    </div>
  `;
  const log = document.getElementById("chat-log");
  if(log) log.scrollTop = log.scrollHeight;
}

async function sendChat(){
  const input = document.getElementById("chat-input");
  const btn = document.getElementById("chat-send");
  const log = document.getElementById("chat-log");
  if(!input || !btn || !log) return;
  const msg = input.value.trim();
  if(!msg) return;
  if(!CURRENT_PROJECT){
    log.insertAdjacentHTML("beforeend",`<div class="chat-msg assistant">⚠️ Сначала выбери проект (кликни на карточку).</div>`);
    log.scrollTop = log.scrollHeight;
    return;
  }
  log.insertAdjacentHTML("beforeend",`<div class="chat-msg user">${esc(msg)}</div>`);
  log.scrollTop = log.scrollHeight;
  input.value = "";
  btn.disabled = true; btn.textContent = "Думаю…";
  try{
    const r = await fetch(`${AGENTS}/orchestrator/chat`,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({vertical_id:CURRENT_PROJECT, message:msg}),
    });
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();
    log.insertAdjacentHTML("beforeend",`<div class="chat-msg assistant">${esc(d.reply||d.error||"Нет ответа")}</div>`);
  } catch(e){
    log.insertAdjacentHTML("beforeend",`<div class="chat-msg assistant">⚠️ ${esc(e.message)}</div>`);
  }
  log.scrollTop = log.scrollHeight;
  btn.disabled = false; btn.textContent = "Отправить";
}

// ─── state ───────────────────────────────────────────────
let _tgAccs = [];

let _tgSortBy = "warming_day";
let _tgFilter = "all";
let _tgCollapsed = {};

const TG_STATUS_COLOR = {
  idle:"var(--faint)", warming:"var(--amber)",
  active:"var(--green)", banned:"var(--red)", flood_wait:"var(--amber)"
};
const TG_PHASE_LABEL = {
  idle:"не начат", views_only:"дни 1–3",
  neutral_content:"дни 4–5", niche_content:"дни 6–7", monetization:"день 8+"
};

// ─── fetch ────────────────────────────────────────────────
async function tgFetchAccounts(){
  try {
    const r = await ft(`${AGENTS}/telegram/status`, {
      method:"POST", headers:{"Content-Type":"application/json"}, body:"{}"
    }, 10000);
    if(!r.ok) return [];
    const d = await r.json();
    return d.accounts || [];
  } catch(e){ return []; }
}

// ─── group + sort ─────────────────────────────────────────
function tgGroupAccounts(accs, groupBy, sortBy, filter){
  let list = accs.filter(a => filter==="all" || a.status===filter);
  list = [...list].sort((a,b)=>{
    if(sortBy==="warming_day") return (b.warming_day||0)-(a.warming_day||0);
    if(sortBy==="phone") return (a.phone||"").localeCompare(b.phone||"");
    if(sortBy==="status") return (a.status||"").localeCompare(b.status||"");
    return 0;
  });
  const groups = {};
  list.forEach(a=>{
    const key = groupBy==="none" ? "Все аккаунты" :
                groupBy==="vertical" ? (a.vertical||"—") :
                groupBy==="geo" ? (a.geo||"—") :
                groupBy==="status" ? (a.status||"—") : "—";
    (groups[key]||(groups[key]=[])).push(a);
  });
  return groups;
}

// ─── render account row ───────────────────────────────────
function tgRowHtml(a){
  const sc = TG_STATUS_COLOR[a.status]||"var(--faint)";
  const ph = TG_PHASE_LABEL[a.warming_phase]||"—";
  const needAuth = a.status==="idle";
  return `<div class="tg-row" data-id="${esc(a.id)}">
    <span style="width:8px;height:8px;border-radius:50%;background:${sc};display:inline-block;flex-shrink:0"></span>
    <span class="acc-phone">${esc(a.phone)}</span>
    <span>${chip(a.status, sc)}</span>
    <span style="font-family:var(--mono);font-size:12px;color:var(--muted)">${a.warming_day}</span>
    <span style="font-size:11px;color:var(--faint)">${ph}</span>
    <span style="font-size:11px;color:var(--muted)">${esc(a.geo||"—")}</span>
    <span class="acc-actions">
      ${needAuth
        ? `<button class="btn btn-ghost btn-sm" onclick="tgOpenAuth('${esc(a.id)}','${esc(a.phone)}')">🔑 Авторизовать</button>`
        : `<button class="btn btn-ghost btn-sm" onclick="tgRunWarmup('${esc(a.id)}')">▶ Прогрев</button>`}
    </span>
  </div>`;
}

// ─── render groups ────────────────────────────────────────
function tgGroupsHtml(groups){
  if(Object.keys(groups).length===0)
    return `<div class="card"><div class="note">Аккаунтов нет. Нажми <b>+ Добавить аккаунт</b>.</div></div>`;

  return Object.entries(groups).map(([key, list])=>{
    const open = !_tgCollapsed[key];
    const counts = {};
    list.forEach(a=>{ counts[a.status]=(counts[a.status]||0)+1; });

      `<span class="chip" style="background:${TG_STATUS_COLOR[s]||"var(--faint)"}1a;color:${TG_STATUS_COLOR[s]||"var(--faint)"};margin-left:5px">${s} ${n}</span>`
    ).join("");
    return `<div class="tg-group">
      <div class="tg-group-head" onclick="tgToggleGroup('${esc(key)}')">
        <span class="tg-group-arrow ${open?"open":""}">▶</span>
        <span class="tg-group-label">${esc(key)}</span>
        ${pills}
        <span class="tg-group-meta">${list.length} акк.</span>
      </div>
      ${open ? `<div class="tg-group-body">
        <div class="tg-row" style="background:var(--surface3);font-size:10px;color:var(--faint);padding:5px 14px;">

        </div>
        ${list.map(tgRowHtml).join("")}

    </div>`;
  }).join("");
}

        <tr><td class="hi">1–3</td><td>views_only</td><td>Просмотры каналов, реакции</td><td>25 просм./день, 12 реакций</td></tr>
        <tr><td class="hi">4–5</td><td>neutral_content</td><td>+ нейтральные посты</td><td>1 пост, 2 комментария</td></tr>
        <tr><td class="hi">6–7</td><td>niche_content</td><td>+ нишевые посты</td><td>1 пост, 3 комментария</td></tr>
        <tr><td class="hi">8+</td><td>monetization</td><td>CTA, ссылки, партнёрка</td><td>4 комментария, 2 поста</td></tr>

        <tr><td class="hi">telegram-warmup</td><td class="mono">09:00 ежедневно</td><td>T2 прогрев + T4 реакции</td></tr>
        <tr><td class="hi">telegram-commenter</td><td class="mono">12:00 и 19:00</td><td>T3 комментарии (день 6+)</td></tr>

    <div id="tg-modal"></div>
  `;
}

// ─── редрав групп без полного ре-рендера ─────────────────
function tgRedraw(){
  const groups = tgGroupAccounts(_tgAccs, _tgGroupBy, _tgSortBy, _tgFilter);
  const el = document.getElementById("tg-groups");
  if(el) el.innerHTML = tgGroupsHtml(groups);
}

// ─── collapse/expand ──────────────────────────────────────
function tgToggleGroup(key){
  _tgCollapsed[key] = !_tgCollapsed[key];
  tgRedraw();
}
function tgCollapseAll(){
  const groups = tgGroupAccounts(_tgAccs, _tgGroupBy, _tgSortBy, _tgFilter);
  Object.keys(groups).forEach(k=>{ _tgCollapsed[k]=true; });
  tgRedraw();
}
function tgExpandAll(){
  _tgCollapsed = {};
  tgRedraw();
}

// ─── modal helper ─────────────────────────────────────────
function tgModal(html){ document.getElementById("tg-modal").innerHTML = html; }
function tgCloseModal(){ document.getElementById("tg-modal").innerHTML = ""; }

// ─── ADD ACCOUNT modal ────────────────────────────────────
function tgOpenAdd(){
  tgModal(`<div class="modal-overlay" onclick="if(event.target===this)tgCloseModal()">
    <div class="modal">
      <h3>➕ Добавить аккаунт</h3>
      <div class="form-row">
        <label>Номер телефона</label>
        <input id="tg-add-phone" type="text" placeholder="+79001234567">
      </div>
      <div class="form-row-2">
        <div class="form-row" style="margin:0">
          <label>api_id</label>
          <input id="tg-add-apiid" type="text" placeholder="12345678">
        </div>
        <div class="form-row" style="margin:0">
          <label>api_hash</label>
          <input id="tg-add-apihash" type="text" placeholder="abc123def...">
        </div>
      </div>
      <div class="form-row-2">
        <div class="form-row" style="margin:0">
          <label>Вертикаль</label>
          <select id="tg-add-vertical">
            <option value="nutra">nutra</option>
            <option value="betting">betting</option>
          </select>
        </div>
        <div class="form-row" style="margin:0">
          <label>GEO</label>
          <select id="tg-add-geo">
            <option value="PL">PL</option><option value="RO">RO</option>
            <option value="RU">RU</option><option value="KZ">KZ</option>
            <option value="MX">MX</option><option value="BR">BR</option>
            <option value="IN">IN</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <label>Proxy (опционально)</label>
        <input id="tg-add-proxy" type="text" placeholder="socks5://user:pass@host:port">
      </div>
      <div id="tg-add-msg"></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="tgCloseModal()">Отмена</button>
        <button class="btn btn-primary" onclick="tgSubmitAdd()">Добавить</button>
      </div>
      <div style="margin-top:14px;font-size:11px;color:var(--faint)">
        api_id и api_hash — на <b style="color:var(--muted)">my.telegram.org</b> → API development tools
      </div>
    </div>
  </div>`);
}

async function tgSubmitAdd(){
  const phone = document.getElementById("tg-add-phone").value.trim();
  const api_id = document.getElementById("tg-add-apiid").value.trim();
  const api_hash = document.getElementById("tg-add-apihash").value.trim();
  const vertical = document.getElementById("tg-add-vertical").value;
  const geo = document.getElementById("tg-add-geo").value;
  const proxyRaw = document.getElementById("tg-add-proxy").value.trim();
  const msg = document.getElementById("tg-add-msg");

  if(!phone||!api_id||!api_hash){ msg.innerHTML=`<div class="msg-err">Заполни phone, api_id, api_hash</div>`; return; }

  const body = { phone, api_id:parseInt(api_id), api_hash, vertical, geo };
  if(proxyRaw) body.proxy = proxyRaw;

  msg.innerHTML = `<div style="font-size:12px;color:var(--muted)">Добавляю…</div>`;
  try {
    const r = await fetch(`${AGENTS}/telegram/account/add`, {
      method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body)
    });
    const d = await r.json();
    if(d.ok){
      msg.innerHTML = `<div class="msg-ok">✓ Добавлен! account_id: ${esc(d.account_id)}</div>
        <div style="margin-top:10px"><button class="btn btn-primary" onclick="tgCloseModal();tgOpenAuth('${esc(d.account_id)}','${esc(phone)}')">
          → Авторизовать сразу</button></div>`;
      _tgAccs = await tgFetchAccounts();
      tgRedraw();
    } else {
      msg.innerHTML = `<div class="msg-err">Ошибка: ${esc(d.error||"unknown")}</div>`;
    }
  } catch(e){ msg.innerHTML = `<div class="msg-err">Сервер недоступен: ${esc(e.message)}</div>`; }
}

// ─── AUTH modal (3 шага) ──────────────────────────────────
function tgOpenAuth(accountId, phone){
  tgModal(`<div class="modal-overlay" onclick="if(event.target===this)tgCloseModal()">
    <div class="modal">
      <h3>🔑 Авторизация: ${esc(phone)}</h3>
      <div class="step-indicator">
        <div class="step-dot active" id="sdot-1"></div>
        <div class="step-dot" id="sdot-2"></div>
        <div class="step-dot" id="sdot-3"></div>
      </div>
      <div id="auth-step-content">
        <p style="font-size:13px;color:var(--muted);margin-bottom:16px">
          Нажми <b style="color:var(--text)">Отправить код</b> — Telegram пришлёт SMS или уведомление в другой сеанс.
        </p>
        <div id="auth-msg"></div>
        <div class="modal-actions">
          <button class="btn btn-ghost" onclick="tgCloseModal()">Отмена</button>
          <button class="btn btn-primary" id="auth-btn-send" onclick="tgSendCode('${esc(accountId)}','${esc(phone)}')">
            Отправить код
          </button>
        </div>
      </div>
    </div>
  </div>`);
}

async function tgSendCode(accountId, phone){
  const msg = document.getElementById("auth-msg");
  const btn = document.getElementById("auth-btn-send");
  btn.disabled = true;
  msg.innerHTML = `<div style="font-size:12px;color:var(--muted)">Отправляю запрос…</div>`;
  try {
    const r = await fetch(`${AGENTS}/telegram/login/send-code`, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ account_id: accountId })
    });
    const d = await r.json();
    if(d.ok){
      document.getElementById("sdot-1").className="step-dot done";
      document.getElementById("sdot-2").className="step-dot active";
      document.getElementById("auth-step-content").innerHTML = `
        <p style="font-size:13px;color:var(--muted);margin-bottom:16px">
          Код отправлен на <b style="color:var(--text)">${esc(phone)}</b>. Введи его ниже.
        </p>
        <div class="form-row">
          <label>Код из Telegram</label>
          <input id="auth-code" type="text" placeholder="12345" autofocus style="letter-spacing:.2em;font-size:18px;text-align:center">
        </div>
        <div id="auth-msg2"></div>
        <div class="modal-actions">
          <button class="btn btn-ghost" onclick="tgCloseModal()">Отмена</button>
          <button class="btn btn-primary" onclick="tgConfirmCode('${esc(accountId)}','${esc(phone)}')">Подтвердить</button>
        </div>`;
    } else {
      msg.innerHTML = `<div class="msg-err">Ошибка: ${esc(d.error||"unknown")}</div>`;
      btn.disabled = false;
    }
  } catch(e){
    msg.innerHTML = `<div class="msg-err">Сервер недоступен</div>`;
    btn.disabled = false;
  }
}

async function tgConfirmCode(accountId, phone){
  const code = document.getElementById("auth-code").value.trim();
  const msg = document.getElementById("auth-msg2");
  if(!code){ msg.innerHTML=`<div class="msg-err">Введи код</div>`; return; }
  msg.innerHTML = `<div style="font-size:12px;color:var(--muted)">Проверяю…</div>`;
  try {
    const r = await fetch(`${AGENTS}/telegram/login/confirm-code`, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ account_id: accountId, code })
    });
    const d = await r.json();
    if(d.ok && d.authorized){
      document.getElementById("sdot-2").className="step-dot done";
      document.getElementById("sdot-3").className="step-dot done";
      document.getElementById("auth-step-content").innerHTML = `
        <div style="text-align:center;padding:20px 0">
          <div style="font-size:32px;margin-bottom:12px">✅</div>
          <div style="font-size:14px;font-weight:600;color:var(--green)">Авторизован!</div>
          <div style="font-size:12px;color:var(--muted);margin-top:6px">${esc(phone)} подключён к системе</div>
        </div>
        <div class="modal-actions" style="justify-content:center">
          <button class="btn btn-primary" onclick="tgCloseModal();renderTelegram()">Готово</button>
        </div>`;
      _tgAccs = await tgFetchAccounts();
      tgRedraw();
    } else if(d.need_2fa){
      document.getElementById("sdot-2").className="step-dot done";
      document.getElementById("sdot-3").className="step-dot active";
      document.getElementById("auth-step-content").innerHTML = `
        <p style="font-size:13px;color:var(--muted);margin-bottom:16px">
          Аккаунт защищён <b style="color:var(--text)">двухфакторной аутентификацией</b>. Введи пароль.
        </p>
        <div class="form-row">
          <label>Пароль 2FA</label>
          <input id="auth-2fa" type="password" placeholder="••••••••">
        </div>
        <div id="auth-msg3"></div>
        <div class="modal-actions">
          <button class="btn btn-ghost" onclick="tgCloseModal()">Отмена</button>
          <button class="btn btn-primary" onclick="tgConfirm2FA('${esc(accountId)}','${esc(phone)}')">Войти</button>
        </div>`;
    } else {
      msg.innerHTML = `<div class="msg-err">Ошибка: ${esc(d.error||"Неверный код")}</div>`;
    }
  } catch(e){
    msg.innerHTML = `<div class="msg-err">Сервер недоступен</div>`;
  }
}

async function tgConfirm2FA(accountId, phone){
  const password = document.getElementById("auth-2fa").value;
  const msg = document.getElementById("auth-msg3");
  if(!password){ msg.innerHTML=`<div class="msg-err">Введи пароль</div>`; return; }
  msg.innerHTML = `<div style="font-size:12px;color:var(--muted)">Проверяю…</div>`;
  try {
    const r = await fetch(`${AGENTS}/telegram/login/confirm-2fa`, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ account_id: accountId, password })
    });
    const d = await r.json();
    if(d.ok && d.authorized){
      document.getElementById("sdot-3").className="step-dot done";
      document.getElementById("auth-step-content").innerHTML = `
        <div style="text-align:center;padding:20px 0">
          <div style="font-size:32px;margin-bottom:12px">✅</div>
          <div style="font-size:14px;font-weight:600;color:var(--green)">Авторизован!</div>
          <div style="font-size:12px;color:var(--muted);margin-top:6px">${esc(phone)} подключён</div>
        </div>
        <div class="modal-actions" style="justify-content:center">
          <button class="btn btn-primary" onclick="tgCloseModal();renderTelegram()">Готово</button>
        </div>`;
      _tgAccs = await tgFetchAccounts();
      tgRedraw();
    } else {
      msg.innerHTML = `<div class="msg-err">Ошибка: ${esc(d.error||"Неверный пароль")}</div>`;
    }
  } catch(e){
    msg.innerHTML = `<div class="msg-err">Сервер недоступен</div>`;
  }
}

async function tgRunWarmup(accountId){
  try {
    const r = await fetch(`${AGENTS}/telegram/warmup`, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ account_id: accountId })
    });
    const d = await r.json();
    alert(d.ok ? "✓ Прогрев запущен" : ("Ошибка: "+(d.error||"unknown")));

}
