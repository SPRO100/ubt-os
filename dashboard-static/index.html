<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UBT OS — Командный центр</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --void:#0a0b0f; --surface:#0f1117; --surface2:#151821; --border:#1e2030; --borderLight:#2d3352;
  --text:#e2e8f0; --muted:#94a3b8; --faint:#475569;
  --green:#4ade80; --indigo:#6366f1; --amber:#f59e0b; --red:#f87171; --pink:#f472b6;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--void);color:var(--text);font-family:'Inter',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;}
.mono{font-family:'IBM Plex Mono',monospace;}
:focus-visible{outline:2px solid var(--indigo);outline-offset:2px;}
@media (prefers-reduced-motion: reduce){*{animation-duration:.001ms!important;}}

.app{display:flex;min-height:100vh;}

/* SIDEBAR */
.sidebar{width:226px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;padding:22px 0;background:var(--surface);}
.sidebar-head{padding:0 20px 18px;border-bottom:1px solid var(--border);}
.sidebar-head .logo{font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:.25em;color:var(--green);font-weight:700;}
.sidebar-head .sub{font-size:10px;color:var(--faint);letter-spacing:.15em;margin-top:4px;}
nav{flex:1;padding:14px 10px;overflow-y:auto;}
.nav-btn{
  display:flex;align-items:center;gap:10px;width:100%;padding:9px 12px;margin-bottom:2px;
  background:transparent;border:1px solid transparent;border-radius:8px;cursor:pointer;
  color:var(--faint);font-size:12.5px;text-align:left;font-family:inherit;
}
.nav-btn.active{background:var(--border);border-color:var(--borderLight);color:var(--text);}
.nav-btn:hover:not(.active){color:var(--muted);}
.nav-btn .icon{font-size:14px;}
.sidebar-foot{padding:14px 20px;border-top:1px solid var(--border);font-size:11px;color:var(--faint);line-height:1.6;}
.sidebar-foot .pulse{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-right:5px;animation:pulse 2s infinite;}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(74,222,128,.5);}70%{box-shadow:0 0 0 5px rgba(74,222,128,0);}100%{box-shadow:0 0 0 0 rgba(74,222,128,0);}}

/* MAIN */
main{flex:1;overflow-y:auto;padding:26px 30px 60px;max-width:1100px;}
.page-head{margin-bottom:20px;}
.page-head h1{font-size:20px;font-weight:700;color:#f8fafc;margin:0;}
.page-head .desc{font-size:12px;color:var(--faint);margin-top:3px;}

.section{display:none;}
.section.active{display:block;}

.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px;}
.card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.card-head .title{font-size:12px;font-weight:600;letter-spacing:.06em;color:var(--muted);text-transform:uppercase;}
.card-head .right{font-size:11px;color:var(--faint);}

table{width:100%;border-collapse:collapse;}
th{text-align:left;font-size:10.5px;color:var(--faint);font-weight:500;letter-spacing:.04em;padding:0 10px 8px 0;border-bottom:1px solid var(--border);text-transform:uppercase;}
td{font-size:12.5px;color:var(--muted);padding:9px 10px 9px 0;border-bottom:1px solid var(--border);}
tr:last-child td{border-bottom:none;}
td.primary{color:var(--text);font-weight:600;}
td.mono{font-family:'IBM Plex Mono',monospace;font-size:12px;}

.chip{font-size:10.5px;padding:3px 9px;border-radius:6px;font-weight:600;display:inline-block;}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:8px;}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px;}
.stat .label{font-size:11px;color:var(--faint);margin-bottom:8px;letter-spacing:.04em;}
.stat .value{font-size:24px;font-weight:700;font-family:'IBM Plex Mono',monospace;}
.stat .note{font-size:11px;color:var(--faint);margin-top:4px;}

.priority-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;color:var(--muted);}
.priority-item:last-child{border-bottom:none;}
.priority-item .num{color:var(--green);font-family:'IBM Plex Mono',monospace;flex-shrink:0;}

.live-tag{font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--green);border:1px solid rgba(74,222,128,.3);background:rgba(74,222,128,.08);padding:2px 7px;border-radius:5px;}
.ref-tag{font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);border:1px solid var(--border);padding:2px 7px;border-radius:5px;}

.note-box{font-size:13px;color:var(--muted);line-height:1.65;}
.note-box b{color:var(--text);}
.chips-row{display:flex;gap:8px;flex-wrap:wrap;}

@media (max-width:760px){
  .app{flex-direction:column;}
  .sidebar{width:100%;flex-direction:row;overflow-x:auto;padding:10px;}
  .sidebar-head,.sidebar-foot{display:none;}
  nav{display:flex;padding:0;}
  .nav-btn{white-space:nowrap;}
  main{padding:18px;}
}
</style>
</head>
<body>

<div class="app">

  <aside class="sidebar">
    <div class="sidebar-head">
      <div class="logo">UBT OS</div>
      <div class="sub">TRAFFIC SYSTEM</div>
    </div>
    <nav id="nav"></nav>
    <div class="sidebar-foot" id="sidebar-status"><span class="pulse"></span>Проверка…</div>
  </aside>

  <main>
    <div class="page-head">
      <h1 id="page-title">Dashboard</h1>
      <div class="desc" id="page-desc">Карточки с тегом LIVE читают Supabase в реальном времени · справочные карточки — конфигурация проекта</div>
    </div>

    <section class="section active" id="sec-dashboard"></section>
    <section class="section" id="sec-accounts"></section>
    <section class="section" id="sec-content"></section>
    <section class="section" id="sec-pipeline"></section>
    <section class="section" id="sec-clients"></section>
    <section class="section" id="sec-agents"></section>
    <section class="section" id="sec-analytics"></section>
    <section class="section" id="sec-infra"></section>
    <section class="section" id="sec-knowledge"></section>
  </main>

</div>

<script>
// ───────────────────────────────────────────────
const SUPABASE_URL = "https://ricuoztdelapexfpqsux.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_f_z6goLZoPN68j2N71wX6g_r6jNjrJt";
const AGENTS_SERVER = "http://88.218.121.108:8080";
// ───────────────────────────────────────────────

const headers = { apikey: SUPABASE_ANON_KEY, Authorization: "Bearer " + SUPABASE_ANON_KEY };

function esc(s){ if(s==null) return ""; return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function chip(text,color){ return `<span class="chip" style="color:${color};background:${color}1a">${esc(text)}</span>`; }
function liveTag(){ return `<span class="live-tag">live</span>`; }
function refTag(){ return `<span class="ref-tag">справка</span>`; }

function fetchWithTimeout(url, options = {}, ms = 5000) {
  const controller = new AbortController();
  const id = setTimeout(() => controller.abort(), ms);
  return fetch(url, { ...options, signal: controller.signal }).finally(() => clearTimeout(id));
}
async function countOf(table, filter=""){
  try{
    const res = await fetchWithTimeout(`${SUPABASE_URL}/rest/v1/${table}?select=id${filter}`,{headers:{...headers,Prefer:"count=exact"}});
    const range = res.headers.get("content-range");
    return range ? parseInt(range.split("/")[1]||"0",10) : 0;
  }catch(e){ return 0; }
}
async function fetchRows(table, query){
  try{
    const res = await fetchWithTimeout(`${SUPABASE_URL}/rest/v1/${table}?${query}`,{headers});
    return res.ok ? await res.json() : [];
  }catch(e){ return []; }
}
async function checkHealth(){
  try{
    const res = await fetchWithTimeout(`${AGENTS_SERVER}/health/check-all`, {}, 10000);
    return res.ok ? await res.json() : null;
  }catch(e){ return null; }
}

/* ============================================================
   NAVIGATION
   ============================================================ */
const NAV = [
  {id:"dashboard",icon:"⚡",label:"Dashboard"},
  {id:"accounts",icon:"👤",label:"Аккаунты"},
  {id:"content",icon:"🎬",label:"Производство"},
  {id:"pipeline",icon:"🔄",label:"Пайплайн (n8n)"},
  {id:"clients",icon:"📂",label:"Проекты"},
  {id:"agents",icon:"🧩",label:"Агенты"},
  {id:"analytics",icon:"📊",label:"Аналитика"},
  {id:"infra",icon:"🖥️",label:"Инфраструктура"},
  {id:"knowledge",icon:"🧠",label:"База знаний"},
];
const TITLES = {
  dashboard:["Dashboard","Реальное состояние системы прямо сейчас"],
  accounts:["Аккаунты","0 подключённых аккаунтов · протокол прогрева ниже — справка"],
  content:["Производство","Архитектура пайплайна контента · что реально работает помечено LIVE"],
  pipeline:["Пайплайн (n8n)","6 воркфлоу реально развёрнуты и опубликованы на сервере"],
  clients:["Проекты","Вертикали и изолированные проекты · чат с оркестратором по каждому проекту"],
  agents:["Агенты","7 агентов реально существуют как код · остальное — план"],
  analytics:["Аналитика","Реальная выручка $0 · условия партнёрок — справка, аккаунты не подключены"],
  infra:["Инфраструктура","FirstVDS Амстердам — реально развёрнут и работает"],
  knowledge:["База знаний","Obsidian Vault, синхронизация через n8n каждый час"],
};

document.getElementById("nav").innerHTML = NAV.map(n =>
  `<button class="nav-btn ${n.id==='dashboard'?'active':''}" data-id="${n.id}">
    <span class="icon">${n.icon}</span>${n.label}
  </button>`
).join("");

document.querySelectorAll(".nav-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("sec-"+btn.dataset.id).classList.add("active");
    document.getElementById("page-title").textContent = TITLES[btn.dataset.id][0];
    document.getElementById("page-desc").textContent = TITLES[btn.dataset.id][1];
  });
});

/* ============================================================
   DASHBOARD — живой статус
   ============================================================ */
async function renderDashboard(){
  const health = await checkHealth();
  const [accounts, videos, revenueEvents, knowledgeCount, strategyCount, riskCount] = await Promise.all([
    countOf("accounts"), countOf("videos"), countOf("revenue_events"),
    countOf("knowledge_entries"), countOf("strategy_briefs"), countOf("account_risk_profiles"),
  ]);

  const supaOk = health && health.supabase === "ok";
  const redisOk = health && health.redis === "ok";

  document.getElementById("sidebar-status").innerHTML =
    `<span class="pulse"></span>${supaOk && redisOk ? "Все системы работают" : "Проверка соединений…"}`;

  document.getElementById("sec-dashboard").innerHTML = `
    <div class="stat-grid">
      <div class="stat"><div class="label">SUPABASE ${liveTag()}</div>
        <div class="value" style="color:${supaOk?'var(--green)':'var(--red)'}">${supaOk?'OK':'ERROR'}</div></div>
      <div class="stat"><div class="label">REDIS ${liveTag()}</div>
        <div class="value" style="color:${redisOk?'var(--green)':'var(--red)'}">${redisOk?'OK':'ERROR'}</div></div>
      <div class="stat"><div class="label">Аккаунты ${liveTag()}</div><div class="value">${accounts}</div></div>
      <div class="stat"><div class="label">Видео ${liveTag()}</div><div class="value">${videos}</div></div>
      <div class="stat"><div class="label">Revenue events ${liveTag()}</div><div class="value">${revenueEvents}</div></div>
      <div class="stat"><div class="label">Записи знаний ${liveTag()}</div><div class="value">${knowledgeCount}</div></div>
    </div>

    <div class="card">
      <div class="card-head"><span class="title">Что дальше</span><span class="right">актуальный приоритет</span></div>
      ${["Подключить Higgsfield API → первая реальная генерация видео",
         "Зарегистрировать партнёрки (1win, Dr.Cash) и подключить Keitaro для трекинга конверсий",
         "Завести первый реальный аккаунт и пройти 7-дневный протокол прогрева",
         "Настроить Compliance Gate перед первой публикацией (особенно для беттинга)",
         "После первых реальных видео — включить Risk Engine и Strategy Engine по расписанию"]
        .map((t,i)=>`<div class="priority-item"><span class="num">${String(i+1).padStart(2,"0")}</span>${esc(t)}</div>`).join("")}
    </div>

    <div class="card">
      <div class="card-head"><span class="title">Позиционирование</span><span class="right">${refTag()} стратегическая заметка, не измеряемая метрика</span></div>
      <table>
        <tr><th>Фактор</th><th>GeeLark</th><th>Conbersa</th><th>NoimosAI</th><th>UBT OS</th></tr>
        ${[["Claude как оркестратор",0,0,0,1],["Higgsfield видео-генерация",0,0,0,1],
           ["Direction-based workflow",0,0,0,1],["Obsidian как персистентная память",0,0,0,1],
           ["Человек одобряет ключевые действия",0,0,0,1]]
          .map(([f,a,b,c,d])=>`<tr><td class="primary">${f}</td>
            <td>${a?"✓":"—"}</td><td>${b?"✓":"—"}</td><td>${c?"✓":"—"}</td>
            <td style="color:var(--green)">${d?"✓":"—"}</td></tr>`).join("")}
      </table>
    </div>
  `;
}

/* ============================================================
   ACCOUNTS
   ============================================================ */
async function renderAccounts(){
  const accounts = await fetchRows("accounts",
    "select=id,platform,username,status,warming_phase,warming_day,geo,niche,partner_program,created_at&order=created_at.desc&limit=100");

  const tabStyle = (active) =>
    `style="background:${active?'var(--indigo)':'var(--surface2)'};color:${active?'#fff':'var(--muted)'};
     border:1px solid ${active?'var(--indigo)':'var(--border)'};border-radius:7px;padding:6px 14px;
     font-size:12px;cursor:pointer;font-family:inherit;"`;

  const platformColors = {tiktok:"#f472b6",youtube:"#f87171",instagram:"#fb923c",telegram:"#60a5fa"};
  const statusColors   = {new:"#94a3b8",warming:"#f59e0b",active:"#4ade80",shadow_banned:"#f87171",hard_banned:"#dc2626",replaced:"#6b7280",paused:"#a78bfa"};

  document.getElementById("sec-accounts").innerHTML = `
    <!-- ТАБЫ -->
    <div style="display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;">
      <button ${tabStyle(true)}  onclick="accTab('list')"    id="tab-list">📋 Список</button>
      <button ${tabStyle(false)} onclick="accTab('add')"     id="tab-add">➕ Добавить</button>
      <button ${tabStyle(false)} onclick="accTab('import')"  id="tab-import">📦 Массовый импорт</button>
      <button ${tabStyle(false)} onclick="accTab('checker')" id="tab-checker">🔍 Чекер</button>
    </div>

    <!-- ─── СПИСОК ─── -->
    <div id="acc-list">
      <div class="card">
        <div class="card-head">
          <span class="title">Аккаунты ${liveTag()}</span>
          <span class="right">${accounts.length} записей</span>
        </div>
        ${accounts.length ? `
          <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;" id="platform-filters">
            <button onclick="filterPlatform('')"        style="font-size:11px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:4px 10px;color:var(--muted);cursor:pointer;" data-p="">Все</button>
            <button onclick="filterPlatform('tiktok')"    style="font-size:11px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:4px 10px;color:#f472b6;cursor:pointer;" data-p="tiktok">TikTok</button>
            <button onclick="filterPlatform('youtube')"   style="font-size:11px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:4px 10px;color:#f87171;cursor:pointer;" data-p="youtube">YouTube</button>
            <button onclick="filterPlatform('instagram')" style="font-size:11px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:4px 10px;color:#fb923c;cursor:pointer;" data-p="instagram">Instagram</button>
            <button onclick="filterPlatform('telegram')"  style="font-size:11px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:4px 10px;color:#60a5fa;cursor:pointer;" data-p="telegram">Telegram</button>
          </div>
          <div id="acc-table-wrap">
            <table id="acc-table">
              <tr><th>Платформа</th><th>Username</th><th>Статус</th><th>Фаза</th><th>День</th><th>Гео</th><th>Партнёрка</th><th>Добавлен</th></tr>
              ${accounts.map(a=>`<tr data-platform="${esc(a.platform)}">
                <td><span style="color:${platformColors[a.platform]||'var(--muted)'};font-weight:600;">${esc(a.platform)}</span></td>
                <td class="primary mono">@${esc(a.username||'—')}</td>
                <td><span class="chip" style="color:${statusColors[a.status]||'var(--muted)'};background:${statusColors[a.status]||'var(--muted)'}1a">${esc(a.status)}</span></td>
                <td class="mono" style="font-size:11px;">${esc(a.warming_phase||'idle')}</td>
                <td class="mono">${esc(a.warming_day||0)}</td>
                <td>${esc(a.geo||'—')}</td>
                <td style="font-size:11px;">${esc(a.partner_program||'—')}</td>
                <td class="mono" style="font-size:11px;">${esc((a.created_at||'').slice(0,10))}</td>
              </tr>`).join('')}
            </table>
          </div>
        ` : `<div class="note-box">Таблица <code>accounts</code> пуста. Добавьте первый аккаунт через вкладку «Добавить».</div>`}
      </div>

      <div class="card">
        <div class="card-head"><span class="title">Протокол прогрева</span><span class="right">справка</span></div>
        <table><tr><th>Дни</th><th>Фаза</th><th>Действия</th><th>Постов/день</th></tr>
          <tr><td class="primary">1–3</td><td><span class="mono">views_only</span></td><td>Просмотры + лайки, не постим</td><td>0</td></tr>
          <tr><td class="primary">4–5</td><td><span class="mono">neutral_content</span></td><td>Нейтральные видео без CTA</td><td>2</td></tr>
          <tr><td class="primary">6–7</td><td><span class="mono">niche_content</span></td><td>Нишевые видео без ссылок</td><td>2</td></tr>
          <tr><td class="primary">8+</td><td><span class="mono">monetization</span></td><td>CTA + партнёрские ссылки</td><td>5</td></tr>
        </table>
      </div>
    </div>

    <!-- ─── ДОБАВИТЬ ─── -->
    <div id="acc-add" style="display:none;">
      <div class="card">
        <div class="card-head"><span class="title">Добавить аккаунт</span></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;" id="add-form">
          <div>
            <label style="font-size:11px;color:var(--faint);display:block;margin-bottom:5px;">ПЛАТФОРМА *</label>
            <select id="af-platform" style="width:100%;background:var(--void);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:9px 10px;font-size:13px;font-family:inherit;">
              <option value="tiktok">TikTok</option>
              <option value="youtube">YouTube</option>
              <option value="instagram">Instagram</option>
              <option value="telegram">Telegram</option>
            </select>
          </div>
          <div>
            <label style="font-size:11px;color:var(--faint);display:block;margin-bottom:5px;">USERNAME *</label>
            <input id="af-username" type="text" placeholder="@username или номер телефона"
              style="width:100%;background:var(--void);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:9px 10px;font-size:13px;font-family:inherit;box-sizing:border-box;">
          </div>
          <div>
            <label style="font-size:11px;color:var(--faint);display:block;margin-bottom:5px;">ГЕО</label>
            <input id="af-geo" type="text" placeholder="PL, RO, RU, KZ..."
              style="width:100%;background:var(--void);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:9px 10px;font-size:13px;font-family:inherit;box-sizing:border-box;">
          </div>
          <div>
            <label style="font-size:11px;color:var(--faint);display:block;margin-bottom:5px;">НИША</label>
            <input id="af-niche" type="text" placeholder="nutra, betting, cars..."
              style="width:100%;background:var(--void);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:9px 10px;font-size:13px;font-family:inherit;box-sizing:border-box;">
          </div>
          <div>
            <label style="font-size:11px;color:var(--faint);display:block;margin-bottom:5px;">ПАРТНЁРСКАЯ ПРОГРАММА</label>
            <select id="af-partner" style="width:100%;background:var(--void);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:9px 10px;font-size:13px;font-family:inherit;">
              <option value="">— не указана —</option>

async function importTextList(platform, inputId, format, resultId, geo, partner, niche){
  const raw = document.getElementById(inputId).value.trim();
  const msg = document.getElementById(resultId);
  if(!raw){ msg.textContent="⚠️ Вставьте данные"; msg.style.color="var(--amber)"; return; }
  const lines = raw.split("\n").map(l=>l.trim()).filter(Boolean);
  const accounts = lines.map(line=>{
    const parts = line.split(":");
    const obj = {platform, username: parts[0]};
    if(parts[1]) obj.password = parts[1];
    if(parts[2]) obj.extra1   = parts[2];
    if(parts[3]) obj.extra2   = parts[3];
    if(geo)     obj.geo = geo;
    if(partner) obj.partner_program = partner;
    if(niche)   obj.niche = niche;
    return obj;
  });
  msg.textContent=`Импортирую ${accounts.length} аккаунтов…`; msg.style.color="var(--muted)";
  try{
    const res = await fetchWithTimeout(`${AGENTS_SERVER}/accounts/import`,{
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({accounts})
    }, 60000);
    const data = await res.json();
    if(data.error){ msg.textContent="❌ "+data.error; msg.style.color="var(--red)"; }
    else {
      msg.textContent=`✅ Добавлено: ${data.inserted}, пропущено: ${data.skipped}`;
      msg.style.color = data.skipped > 0 ? "var(--amber)" : "var(--green)";
    }
  }catch(e){ msg.textContent="❌ "+e.message; msg.style.color="var(--red)"; }
}

async function processDroppedFile(file){
  const resultEl = document.getElementById("drop-result");
  resultEl.style.display="block";
  resultEl.innerHTML=`<div class="note-box">⏳ Анализирую файл <b>${esc(file.name)}</b> (${(file.size/1024).toFixed(1)} KB)…</div>`;

  const isZip  = file.name.endsWith(".zip");
  const isJson = file.name.endsWith(".json");
  const isTxt  = file.name.endsWith(".txt") || file.name.endsWith(".csv");

  if(isZip){
    resultEl.innerHTML=`
      <div class="note-box" style="border-color:var(--amber);">
        <b>📦 ZIP-архив обнаружен: ${esc(file.name)}</b><br>
        Вероятно содержит tdata-сессии Telegram. Загрузите архив в Supabase Storage (bucket <code>tg-sessions</code>), затем зарегистрируйте аккаунт во вкладке <b>Telegram → tdata</b>.
      </div>`;
    return;
  }

  const text = await file.text();

  if(isJson || text.trimStart().startsWith("[")){
    let arr;
    try{ arr = JSON.parse(text); }
    catch(e){ resultEl.innerHTML=`<div class="note-box" style="border-color:var(--red);">❌ Невалидный JSON: ${esc(e.message)}</div>`; return; }
    if(!Array.isArray(arr)){ resultEl.innerHTML=`<div class="note-box" style="border-color:var(--red);">❌ Ожидается массив []</div>`; return; }
    showDropPreview(arr, file.name, "json");
    return;
  }

  // text file: try login:pass
  const lines = text.split("\n").map(l=>l.trim()).filter(l=>l && l.includes(":"));
  if(lines.length){
    const sample = lines[0].split(":");
    let platform="unknown";
    if(sample[0].startsWith("+")) platform="telegram";
    else if(sample[0].includes("@gmail")) platform="youtube";
    else if(sample[0].includes("@")) platform="instagram";
    const arr = lines.map(line=>{ const p=line.split(":"); return {platform, username:p[0], password:p[1]||""}; });
    showDropPreview(arr, file.name, "text", platform);
    return;
  }

  resultEl.innerHTML=`<div class="note-box" style="border-color:var(--red);">❌ Не удалось определить формат. Используйте ручной ввод ниже.</div>`;
}

  const msg     = document.getElementById("drop-import-result");
  if(!arr.length){ if(msg) msg.textContent="❌ Нет данных"; return; }

  const accounts = arr.map(a=>({
    ...a,
    platform: a.platform || plat || "telegram",
    ...(geo     ? {geo}              : {}),
    ...(projId  ? {vertical_id:projId}: {}),
  }));
  if(msg){ msg.textContent=`Импортирую ${accounts.length}…`; msg.style.color="var(--muted)"; }
  try{
    const res = await fetchWithTimeout(`${AGENTS_SERVER}/accounts/import`,{
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({accounts})
    }, 60000);
    const data = await res.json();
    if(data.error){ if(msg){ msg.textContent="❌ "+data.error; msg.style.color="var(--red)"; } }
    else { if(msg){ msg.textContent=`✅ Добавлено: ${data.inserted}, пропущено: ${data.skipped}`; msg.style.color=data.skipped>0?"var(--amber)":"var(--green)"; } }
  }catch(e){ if(msg){ msg.textContent="❌ "+e.message; msg.style.color="var(--red)"; } }
}

async function runChecker(){
  const btn = document.querySelector('[onclick="runChecker()"]');
  const statusEl = document.getElementById("checker-status");
  btn.disabled = true; btn.textContent = "⏳ Проверяю…";
  statusEl.textContent = "Запрос отправлен, ждём результат…"; statusEl.style.color="var(--muted)";
  try{
    const res = await fetchWithTimeout(`${AGENTS_SERVER}/accounts/checker/run`,{
      method:"POST", headers:{"Content-Type":"application/json"}, body:"{}"
    }, 120000);
    const data = await res.json();
    if(data.error){ statusEl.textContent="❌ "+data.error; statusEl.style.color="var(--red)"; return; }
    // summary
    const s = data.summary || {};
    document.getElementById("checker-summary").style.display = "grid";
    document.getElementById("cs-total").textContent = data.total || 0;
    document.getElementById("cs-ok").textContent    = s.ok   || 0;
    document.getElementById("cs-warn").textContent  = s.warn || 0;
    document.getElementById("cs-stop").textContent  = s.stop || 0;
    statusEl.textContent = `✅ Проверено ${data.total} аккаунтов`; statusEl.style.color="var(--green)";
    // results table
    const results = data.results || [];
    if(results.length){
      const verdictColor = {ok:"var(--green)",warn:"var(--amber)",stop:"var(--red)"};
      document.getElementById("checker-results").innerHTML = `
        <table style="margin-top:14px;">
          <tr><th>Username</th><th>Платформа</th><th>Фаза</th><th>День</th><th>Вердикт</th><th>Детали</th></tr>
          ${results.map(r=>`<tr>

            <td>${esc(r.platform||'—')}</td>
            <td class="mono" style="font-size:11px;">${esc(r.phase||'—')}</td>
            <td>${esc(r.warming_day??'—')}</td>
            <td><span style="color:${verdictColor[r.verdict]||'var(--muted)'};font-weight:600;">${esc(r.verdict?.toUpperCase()||'?')}</span></td>
            <td style="font-size:11px;">${(r.checks||[]).map(c=>`<span style="color:${c.status==='OK'?'var(--green)':c.status==='WARN'?'var(--amber)':'var(--red)'}">${esc(c.metric)}: ${esc(c.status)}</span>`).join(' · ')}</td>

  return `<div style="align-self:${isUser?'flex-end':'flex-start'};max-width:80%;background:${isUser?'var(--indigo)':'var(--surface2)'};

}

async function sendChatMessage(){
  const input = document.getElementById("chat-input");
  const btn = document.getElementById("chat-send");
  const message = input.value.trim();
  if(!message || !CURRENT_PROJECT) return;

  const log = document.getElementById("chat-log");
  log.insertAdjacentHTML("beforeend", renderChatMsg({role:"user", content:message}));
  log.scrollTop = log.scrollHeight;
  input.value = "";
  btn.disabled = true;
  btn.textContent = "Думаю…";

  try{
    const res = await fetchWithTimeout(`${AGENTS_SERVER}/orchestrator/chat`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({vertical_id: CURRENT_PROJECT, message}),
    }, 120000);
    const data = await res.json();
    log.insertAdjacentHTML("beforeend", renderChatMsg({role:"assistant", content: data.reply || data.error || "Ошибка ответа"}));
  }catch(e){
    log.insertAdjacentHTML("beforeend", renderChatMsg({role:"assistant", content:"⚠️ Не удалось связаться с оркестратором: "+e.message}));
  }
  log.scrollTop = log.scrollHeight;
  btn.disabled = false;
  btn.textContent = "Отправить";
}
