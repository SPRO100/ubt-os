<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UBT OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0f1a;
  --surface:#111827;
  --surface2:#1a2235;
  --surface3:#212d42;
  --border:#1e2d45;
  --border2:#263352;
  --text:#f0f4ff;
  --muted:#8b9cc4;
  --faint:#4a5880;
  --green:#22c55e;
  --green-dim:rgba(34,197,94,.12);
  --blue:#3b82f6;
  --blue-dim:rgba(59,130,246,.12);
  --indigo:#6366f1;
  --amber:#f59e0b;
  --amber-dim:rgba(245,158,11,.12);
  --red:#ef4444;
  --red-dim:rgba(239,68,68,.12);
  --pink:#ec4899;
  --mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,sans-serif;font-size:13px;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;}

/* ── SIDEBAR ── */
.sidebar{width:220px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;position:sticky;top:0;}
.sb-logo{padding:20px 18px 16px;border-bottom:1px solid var(--border);}
.sb-logo .mark{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--green);letter-spacing:.2em;}
.sb-logo .sub{font-size:10px;color:var(--faint);letter-spacing:.12em;margin-top:3px;}
.sb-nav{flex:1;padding:10px 8px;overflow-y:auto;}
.nav-item{display:flex;align-items:center;gap:9px;width:100%;padding:8px 10px;border-radius:8px;cursor:pointer;color:var(--faint);font-size:12.5px;background:none;border:none;text-align:left;font-family:inherit;transition:background .15s,color .15s;}
.nav-item:hover{background:var(--surface2);color:var(--muted);}
.nav-item.active{background:var(--surface3);color:var(--text);}
.nav-item .ni{width:16px;text-align:center;font-size:13px;}
.sb-user{padding:14px 18px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.sb-user .ava{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#3b82f6);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;}
.sb-user .info{flex:1;min-width:0;}
.sb-user .name{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb-user .role{font-size:10px;color:var(--faint);}
.pulse-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.4);}50%{box-shadow:0 0 0 5px rgba(34,197,94,0);}}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;min-height:100vh;overflow:hidden;}

/* TOPBAR */
.topbar{height:58px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;background:var(--surface);flex-shrink:0;}
.topbar .greet{flex:1;font-size:15px;font-weight:600;color:var(--text);}
.topbar .greet span{color:var(--muted);font-weight:400;}
.search{background:var(--surface2);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;gap:8px;padding:6px 12px;color:var(--faint);font-size:12px;width:220px;}
.search input{background:none;border:none;outline:none;color:var(--muted);font-size:12px;width:100%;font-family:inherit;}
.tb-icon{width:32px;height:32px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:14px;}
.tb-ava{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#3b82f6);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;cursor:pointer;}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:22px 24px 48px;}

/* SECTIONS */
.section{display:none;}
.section.active{display:block;}

/* KPI ROW */
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px;}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden;}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent,var(--blue));}
.kpi .k-label{font-size:10.5px;color:var(--faint);letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px;}
.kpi .k-val{font-size:22px;font-weight:700;font-family:var(--mono);color:var(--text);line-height:1;}
.kpi .k-sub{font-size:10.5px;color:var(--muted);margin-top:5px;}
.kpi .k-badge{position:absolute;top:12px;right:12px;font-size:9px;padding:2px 7px;border-radius:5px;font-weight:600;letter-spacing:.05em;}
.badge-green{background:var(--green-dim);color:var(--green);}
.badge-amber{background:var(--amber-dim);color:var(--amber);}
.badge-red{background:var(--red-dim);color:var(--red);}
.badge-blue{background:var(--blue-dim);color:var(--blue);}

/* TWO PANE */
.two-pane{display:grid;grid-template-columns:1fr 320px;gap:16px;margin-bottom:16px;}
.three-pane{display:grid;grid-template-columns:260px 1fr 280px;gap:16px;margin-bottom:16px;}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:14px;}
.card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.card-title{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);}
.card-sub{font-size:10.5px;color:var(--faint);}

/* PROJECT CARDS */
.projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:16px;}
.proj-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:border-color .2s,background .2s;position:relative;overflow:hidden;}
.proj-card:hover{border-color:var(--border2);background:var(--surface2);}
.proj-card .pc-accent{position:absolute;top:0;left:0;bottom:0;width:3px;border-radius:10px 0 0 10px;}
.proj-card .pc-name{font-size:13.5px;font-weight:600;color:var(--text);margin-bottom:4px;padding-left:10px;}
.proj-card .pc-cat{font-size:11px;color:var(--faint);padding-left:10px;margin-bottom:12px;}
.proj-card .pc-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding-left:10px;}
.proj-card .ps{text-align:center;}
.proj-card .ps-val{font-size:15px;font-weight:700;font-family:var(--mono);}
.proj-card .ps-label{font-size:9.5px;color:var(--faint);margin-top:2px;}

/* AGENT LIST */
.agent-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);}
.agent-row:last-child{border-bottom:none;}
.agent-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.agent-name{flex:1;font-size:12px;color:var(--text);}
.agent-meta{font-size:10.5px;color:var(--faint);}
.agent-badge{font-size:9.5px;padding:2px 7px;border-radius:5px;font-weight:600;}

/* ACTIVITY FEED */
.feed-item{display:flex;gap:9px;padding:8px 0;border-bottom:1px solid var(--border);}
.feed-item:last-child{border-bottom:none;}
.feed-icon{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;margin-top:1px;}
.feed-body{flex:1;min-width:0;}
.feed-title{font-size:12px;color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.feed-time{font-size:10.5px;color:var(--faint);margin-top:2px;}

/* SYSTEM MAP */
.sys-map{display:flex;flex-direction:column;gap:8px;align-items:center;padding:8px 0;}
.map-row{display:flex;gap:12px;justify-content:center;}
.map-node{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:6px 12px;font-size:11px;font-weight:600;color:var(--text);cursor:default;transition:border-color .2s;}
.map-node:hover{border-color:var(--blue);}
.map-node.hub{background:linear-gradient(135deg,rgba(99,102,241,.2),rgba(59,130,246,.15));border-color:var(--indigo);color:#a5b4fc;}
.map-node.ok{border-color:rgba(34,197,94,.3);}
.map-arrow{color:var(--faint);font-size:16px;text-align:center;}

/* ALERT ITEMS */
.alert-item{display:flex;gap:9px;padding:8px;border-radius:8px;margin-bottom:7px;}
.alert-item:last-child{margin-bottom:0;}
.alert-item.warn{background:var(--amber-dim);border:1px solid rgba(245,158,11,.2);}
.alert-item.info{background:var(--blue-dim);border:1px solid rgba(59,130,246,.2);}
.alert-item.ok{background:var(--green-dim);border:1px solid rgba(34,197,94,.2);}
.alert-icon{font-size:16px;flex-shrink:0;}
.alert-text{font-size:11.5px;color:var(--text);}
.alert-sub{font-size:10.5px;color:var(--muted);margin-top:2px;}

/* TABLE */
table{width:100%;border-collapse:collapse;}
th{text-align:left;font-size:10px;color:var(--faint);font-weight:500;letter-spacing:.06em;padding:0 10px 8px 0;border-bottom:1px solid var(--border);text-transform:uppercase;}
td{font-size:12px;color:var(--muted);padding:8px 10px 8px 0;border-bottom:1px solid var(--border);}
tr:last-child td{border-bottom:none;}
td.hi{color:var(--text);font-weight:600;}
td.mono{font-family:var(--mono);font-size:11.5px;}

/* TAGS */
.live{font-size:8.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--green);border:1px solid rgba(34,197,94,.3);background:var(--green-dim);padding:2px 6px;border-radius:4px;margin-left:6px;}
.ref{font-size:8.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);border:1px solid var(--border);padding:2px 6px;border-radius:4px;margin-left:6px;}

/* STAT GRID */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:14px 16px;}
.stat .sl{font-size:10px;color:var(--faint);letter-spacing:.05em;margin-bottom:7px;}
.stat .sv{font-size:22px;font-weight:700;font-family:var(--mono);}
.stat .sn{font-size:10.5px;color:var(--faint);margin-top:4px;}

/* CHAT */
.chat-log{max-height:300px;overflow-y:auto;display:flex;flex-direction:column;gap:7px;margin-bottom:12px;}
.chat-msg{padding:8px 12px;border-radius:10px;font-size:12.5px;max-width:82%;}
.chat-msg.user{background:var(--indigo);color:#fff;align-self:flex-end;}
.chat-msg.assistant{background:var(--surface2);border:1px solid var(--border);color:var(--text);align-self:flex-start;}

/* NOTE */
.note{font-size:12.5px;color:var(--muted);line-height:1.65;}
.note b{color:var(--text);}
.note code{font-family:var(--mono);font-size:11px;background:var(--surface2);padding:1px 5px;border-radius:4px;color:#93c5fd;}

/* CHIP */
.chip{display:inline-block;font-size:10px;padding:2px 8px;border-radius:5px;font-weight:600;}

/* PRIORITY */
.pri-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:12.5px;color:var(--muted);}
.pri-item:last-child{border-bottom:none;}
.pri-num{color:var(--green);font-family:var(--mono);flex-shrink:0;font-size:11px;}

/* PROJECT WORKSPACE */
textarea{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px;font-family:inherit;font-size:13px;resize:vertical;outline:none;}
textarea:focus{border-color:var(--indigo);}
button.send-btn{background:var(--indigo);color:#fff;border:none;border-radius:8px;padding:0 18px;font-size:13px;cursor:pointer;font-family:inherit;}
button.send-btn:disabled{opacity:.5;cursor:not-allowed;}

@media(max-width:900px){
  .sidebar{width:52px;}
  .sb-logo .sub,.sb-user .info,.nav-item span:not(.ni){display:none;}
  .sb-logo .mark{font-size:10px;letter-spacing:.05em;}
  .kpi-row{grid-template-columns:repeat(2,1fr);}
  .three-pane{grid-template-columns:1fr;}
  .two-pane{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sb-logo">
    <div class="mark">UBT OS</div>
    <div class="sub">TRAFFIC SYSTEM</div>
  </div>
  <nav class="sb-nav" id="nav"></nav>
  <div class="sb-user">
    <div class="ava">СП</div>
    <div class="info">
      <div class="name">Сергей</div>
      <div class="role">decision-maker</div>
    </div>
    <div class="pulse-dot"></div>
  </div>
</aside>

<!-- MAIN -->
<div class="main">
  <!-- TOPBAR -->
  <div class="topbar">
    <div class="greet" id="greet">Загрузка… <span></span></div>
    <div class="search">
      <span>🔍</span>
      <input placeholder="Поиск по системе…" readonly>
    </div>
    <div class="tb-icon" title="Уведомления" id="notif-btn">🔔</div>
    <div class="tb-ava" title="Профиль">СП</div>
  </div>

  <!-- CONTENT -->
  <div class="content">
    <div class="section active" id="sec-dashboard"></div>
    <div class="section" id="sec-accounts"></div>
    <div class="section" id="sec-content"></div>
    <div class="section" id="sec-compliance"></div>
    <div class="section" id="sec-pipeline"></div>
    <div class="section" id="sec-clients"></div>
    <div class="section" id="sec-agents"></div>
    <div class="section" id="sec-analytics"></div>
    <div class="section" id="sec-infra"></div>
    <div class="section" id="sec-knowledge"></div>
  </div>
</div>

<script>
// ─── CONFIG ────────────────────────────────────────
const SUPABASE_URL = "https://ricuoztdelapexfpqsux.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_f_z6goLZoPN68j2N71wX6g_r6jNjrJt";
const AGENTS = "http://88.218.121.108:8080";
// ───────────────────────────────────────────────────

const SB_HEADERS = { apikey: SUPABASE_ANON_KEY, Authorization: "Bearer " + SUPABASE_ANON_KEY };

function esc(s){ return s==null?"":String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function live(){ return `<span class="live">live</span>`; }
function ref(){ return `<span class="ref">справка</span>`; }
function chip(t,c){ return `<span class="chip" style="background:${c}1a;color:${c}">${esc(t)}</span>`; }

async function ft(url, opts={}, ms=6000){
  const c=new AbortController(), id=setTimeout(()=>c.abort(),ms);
  try{ return await fetch(url,{...opts,signal:c.signal}); }finally{ clearTimeout(id); }
}
async function count(tbl,q=""){
  try{
    const r=await ft(`${SUPABASE_URL}/rest/v1/${tbl}?select=id${q}`,{headers:{...SB_HEADERS,Prefer:"count=exact"}});
    const rng=r.headers.get("content-range");
    return rng?parseInt(rng.split("/")[1]||"0",10):0;
  }catch(e){return 0;}
}
async function rows(tbl,q){
  try{const r=await ft(`${SUPABASE_URL}/rest/v1/${tbl}?${q}`,{headers:SB_HEADERS});return r.ok?await r.json():[];}catch(e){return [];}
}
async function health(){
  try{const r=await ft(`${AGENTS}/health/check-all`,{},10000);return r.ok?await r.json():null;}catch(e){return null;}
}

// ─── GREETING ──────────────────────────────────────
function greetText(){
  const h=new Date().getHours();
  if(h<6)return "Доброй ночи";
  if(h<12)return "Доброе утро";
  if(h<17)return "Добрый день";
  return "Добрый вечер";
}
document.getElementById("greet").innerHTML =
  `${greetText()}, Сергей 👋 <span style="font-size:13px;font-weight:400;color:var(--faint)">· UBT OS v2 · Sprint 2</span>`;

// ─── NAV ───────────────────────────────────────────
const NAV=[
  {id:"dashboard", icon:"⚡", label:"Главная"},
  {id:"clients",   icon:"📂", label:"Проекты"},
  {id:"agents",    icon:"🤖", label:"Агенты"},
  {id:"analytics", icon:"📊", label:"Аналитика"},
  {id:"compliance",icon:"🛡️", label:"Compliance"},
  {id:"accounts",  icon:"👤", label:"Аккаунты"},
  {id:"content",   icon:"🎬", label:"Производство"},
  {id:"pipeline",  icon:"🔄", label:"n8n"},
  {id:"infra",     icon:"🖥️", label:"Инфраструктура"},
  {id:"knowledge", icon:"🧠", label:"База знаний"},
];

document.getElementById("nav").innerHTML = NAV.map(n =>
  `<button class="nav-item${n.id==="dashboard"?" active":""}" data-id="${n.id}">
    <span class="ni">${n.icon}</span><span>${n.label}</span>
  </button>`
).join("");

document.querySelectorAll(".nav-item").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".nav-item").forEach(b=>b.classList.remove("active"));
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("sec-"+btn.dataset.id).classList.add("active");
  });
});

// ════════════════════════════════════════════════════════
//  DASHBOARD — MAIN PAGE
// ════════════════════════════════════════════════════════
async function renderDashboard(){
  const [h, accs, vids, revs, kn, briefs, risks, convs] = await Promise.all([
    health(),
    count("accounts"), count("videos"), count("revenue_events"),
    count("knowledge_entries"), count("strategy_briefs"),
    count("account_risk_profiles"),
    rows("conversion_events","select=payout_usd&limit=1000"),
  ]);
  const supaOk = h?.supabase==="ok";
  const redisOk = h?.redis==="ok";
  const sysOk = supaOk && redisOk;
  const totalPayout = convs.reduce((s,r)=>s+(parseFloat(r.payout_usd)||0),0);

  const kpiData = [
    {label:"Выплаты", val:`$${totalPayout.toFixed(0)}`, sub:"conversion_events", accent:"var(--green)", badge:"LIVE", badgeCls:"badge-green"},
    {label:"Аккаунтов", val:accs, sub:"в базе Supabase", accent:"var(--blue)", badge:"LIVE", badgeCls:"badge-blue"},
    {label:"Видео", val:vids, sub:"в таблице videos", accent:"var(--indigo)", badge:"LIVE", badgeCls:"badge-blue"},
    {label:"База знаний", val:kn, sub:"knowledge_entries", accent:"var(--amber)", badge:"LIVE", badgeCls:"badge-amber"},
    {label:"Система", val:sysOk?"✓ OK":"⚠", sub:sysOk?"Supabase + Redis":"Проверка...", accent:sysOk?"var(--green)":"var(--red)", badge:sysOk?"ONLINE":"CHECK", badgeCls:sysOk?"badge-green":"badge-red"},
  ];

  const AGENTS_LIST = [
    {name:"Knowledge Synthesizer", file:"knowledge_synthesizer.py", status:"ok", badge:"активен"},
    {name:"Strategy Engine",       file:"strategy_engine.py",       status:"ok", badge:"активен"},
    {name:"Account Checker",       file:"account_checker.py",       status:"ok", badge:"активен"},
    {name:"Revenue Analyst",       file:"revenue_analyst.py",       status:"ok", badge:"активен"},
    {name:"Warming State Machine", file:"warming_state_machine.py", status:"ok", badge:"активен"},
    {name:"Failure Recovery",      file:"failure_recovery.py",      status:"ok", badge:"активен"},
    {name:"Telegram Jitter",       file:"telegram_jitter.py",       status:"warn",badge:"не запущен"},
  ];

  const SPRINT = [
    {name:"Compliance Gate",   route:"/compliance/check", s:"ok"},
    {name:"Warmup Automation", route:"warming_state_machine.py", s:"ok"},
    {name:"Keitaro Postback",  route:"/keitaro/postback", s:"ok"},
    {name:"AgentOps",          route:"/usage/summary", s:"ok"},
    {name:"Higgsfield Queue",  route:"—", s:"hold"},
    {name:"Cross-platform",    route:"—", s:"hold"},
  ];

  const now = new Date();
  const FEED = [
    {icon:"🛡️",bg:"var(--indigo)",title:"Compliance Gate — ONLINE",time:"Sprint 2 · regex + Haiku LLM"},
    {icon:"💰",bg:"var(--green)",title:`Keitaro postback настроен`,time:"POST /keitaro/postback"},
    {icon:"📊",bg:"var(--blue)",title:"AgentOps tracker — активен",time:"LiteLLM callback зарегистрирован"},
    {icon:"🔄",bg:"var(--amber)",title:"n8n — 6 воркфлоу активны",time:"health-monitor · account-checker · ..."},
    {icon:"🧠",bg:"#8b5cf6",title:"Knowledge Synthesizer готов",time:"daily + weekly синтез"},
  ];

  document.getElementById("sec-dashboard").innerHTML = `
    <!-- KPI ROW -->
    <div class="kpi-row">
      ${kpiData.map(k=>`
        <div class="kpi" style="--accent:${k.accent}">
          <div class="k-badge ${k.badgeCls}">${k.badge}</div>
          <div class="k-label">${k.label}</div>
          <div class="k-val">${k.val}</div>
          <div class="k-sub">${k.sub}</div>
        </div>
      `).join("")}
    </div>

    <!-- PROJECTS + ACTIVITY -->
    <div class="two-pane">
      <!-- LEFT: projects + sprint -->
      <div>
        <div class="card">

let CURRENT_PROJECT = null;

async function renderClients(){
  const projects = await rows("vertical_configs","select=id,name,category,config_yaml&order=created_at.asc");
  document.getElementById("sec-clients").innerHTML = `
    <div class="card" id="proj-list">

      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        ${projects.map(p=>`
          <div class="proj-card" data-id="${esc(p.id)}" style="flex:1;min-width:200px;">
            <div class="pc-accent" style="background:var(--blue)"></div>
            <div class="pc-name">${esc(p.name)}</div>
            <div class="pc-cat">${esc(p.category||"")}</div>
          </div>
        `).join("") || `<div class="note">Проекты не найдены в vertical_configs.</div>`}
      </div>
    </div>
    <div id="proj-workspace"></div>
  `;
  document.querySelectorAll(".proj-card[data-id]").forEach(card=>{
    card.addEventListener("click",()=>openProject(card.dataset.id, projects));
  });
}

async function openProject(id, projects){
  CURRENT_PROJECT = id;
  const p = projects.find(x=>x.id===id);
  const [kn, hist] = await Promise.all([
    rows("knowledge_entries",`select=type,content,created_at&vertical=eq.${id}&order=created_at.desc&limit=5`),
    rows("chat_messages",`select=role,content,created_at&vertical_id=eq.${id}&order=created_at.asc&limit=30`),
  ]);

  document.getElementById("proj-workspace").innerHTML = `
    <div class="card">
      <div class="card-head"><span class="card-title">📂 ${esc(p?.name)}</span><span class="card-sub">${ref()}</span></div>
      <div class="note" style="font-family:var(--mono);font-size:11px;white-space:pre-wrap;">${esc(JSON.stringify(p?.config_yaml,null,2))}</div>
    </div>
    <div class="card">
      <div class="card-head"><span class="card-title">База знаний ${live()}</span><span class="card-sub">${kn.length} записей</span></div>
      ${kn.length ? `<table><tr><th>Тип</th><th>Содержание</th><th>Дата</th></tr>
        ${kn.map(k=>`<tr>
          <td>${chip(k.type,"var(--blue)")}</td>
          <td>${esc((k.content||"").slice(0,90))}…</td>
          <td class="mono">${(k.created_at||"").slice(0,10)}</td>
        </tr>`).join("")}
      </table>` : `<div class="note">Нет записей знаний для этого проекта.</div>`}
    </div>
    <div class="card">
      <div class="card-head"><span class="card-title">💬 Чат с оркестратором ${live()}</span></div>
      <div class="chat-log" id="chat-log">
        ${hist.map(m=>`<div class="chat-msg ${m.role}">${esc(m.content)}</div>`).join("")}
      </div>
      <div style="display:flex;gap:8px;">
        <textarea id="chat-input" rows="2" placeholder="Спроси оркестратора об этом проекте…" style="flex:1"></textarea>
        <button class="send-btn" id="chat-send" onclick="sendChat()">Отправить</button>
      </div>
    </div>
  `;
  const log = document.getElementById("chat-log");
  if(log) log.scrollTop = log.scrollHeight;
}

async function sendChat(){
  const input = document.getElementById("chat-input");
  const btn = document.getElementById("chat-send");
  const msg = input.value.trim();
  if(!msg || !CURRENT_PROJECT) return;
  const log = document.getElementById("chat-log");
  log.insertAdjacentHTML("beforeend",`<div class="chat-msg user">${esc(msg)}</div>`);
  log.scrollTop = log.scrollHeight;
  input.value = "";
  btn.disabled = true; btn.textContent = "Думаю…";
  try{
    const r = await ft(`${AGENTS}/orchestrator/chat`,{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({vertical_id:CURRENT_PROJECT,message:msg}),
    },120000);
    const d = await r.json();
    log.insertAdjacentHTML("beforeend",`<div class="chat-msg assistant">${esc(d.reply||d.error||"Ошибка")}</div>`);
  }catch(e){
    log.insertAdjacentHTML("beforeend",`<div class="chat-msg assistant">⚠️ ${esc(e.message)}</div>`);
  }
  log.scrollTop = log.scrollHeight;
  btn.disabled = false; btn.textContent = "Отправить";
}
