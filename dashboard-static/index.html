<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UBT OS — Командный центр</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --void:#0a0b0f; --surface:#0f1117; --surface2:#151821; --border:#1e2030; --borderLight:#2d3352;
  --text:#e2e8f0; --muted:#94a3b8; --faint:#475569;
  --green:#4ade80; --indigo:#6366f1; --amber:#f59e0b; --red:#f87171; --pink:#f472b6;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--void);color:var(--text);font-family:'Inter',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;}
.mono{font-family:'IBM Plex Mono',monospace;}
:focus-visible{outline:2px solid var(--indigo);outline-offset:2px;}
@media (prefers-reduced-motion: reduce){*{animation-duration:.001ms!important;}}

.app{display:flex;min-height:100vh;}

/* SIDEBAR */
.sidebar{width:226px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;padding:22px 0;background:var(--surface);}
.sidebar-head{padding:0 20px 18px;border-bottom:1px solid var(--border);}
.sidebar-head .logo{font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:.25em;color:var(--green);font-weight:700;}
.sidebar-head .sub{font-size:10px;color:var(--faint);letter-spacing:.15em;margin-top:4px;}
nav{flex:1;padding:14px 10px;overflow-y:auto;}
.nav-btn{
  display:flex;align-items:center;gap:10px;width:100%;padding:9px 12px;margin-bottom:2px;
  background:transparent;border:1px solid transparent;border-radius:8px;cursor:pointer;
  color:var(--faint);font-size:12.5px;text-align:left;font-family:inherit;
}
.nav-btn.active{background:var(--border);border-color:var(--borderLight);color:var(--text);}
.nav-btn:hover:not(.active){color:var(--muted);}
.nav-btn .icon{font-size:14px;}
.sidebar-foot{padding:14px 20px;border-top:1px solid var(--border);font-size:11px;color:var(--faint);line-height:1.6;}
.sidebar-foot .pulse{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-right:5px;animation:pulse 2s infinite;}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(74,222,128,.5);}70%{box-shadow:0 0 0 5px rgba(74,222,128,0);}100%{box-shadow:0 0 0 0 rgba(74,222,128,0);}}

/* MAIN */
main{flex:1;overflow-y:auto;padding:26px 30px 60px;max-width:1100px;}
.page-head{margin-bottom:20px;}
.page-head h1{font-size:20px;font-weight:700;color:#f8fafc;margin:0;}
.page-head .desc{font-size:12px;color:var(--faint);margin-top:3px;}

.section{display:none;}
.section.active{display:block;}

.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px;}
.card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.card-head .title{font-size:12px;font-weight:600;letter-spacing:.06em;color:var(--muted);text-transform:uppercase;}
.card-head .right{font-size:11px;color:var(--faint);}

table{width:100%;border-collapse:collapse;}
th{text-align:left;font-size:10.5px;color:var(--faint);font-weight:500;letter-spacing:.04em;padding:0 10px 8px 0;border-bottom:1px solid var(--border);text-transform:uppercase;}
td{font-size:12.5px;color:var(--muted);padding:9px 10px 9px 0;border-bottom:1px solid var(--border);}
tr:last-child td{border-bottom:none;}
td.primary{color:var(--text);font-weight:600;}
td.mono{font-family:'IBM Plex Mono',monospace;font-size:12px;}

.chip{font-size:10.5px;padding:3px 9px;border-radius:6px;font-weight:600;display:inline-block;}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:8px;}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px;}
.stat .label{font-size:11px;color:var(--faint);margin-bottom:8px;letter-spacing:.04em;}
.stat .value{font-size:24px;font-weight:700;font-family:'IBM Plex Mono',monospace;}
.stat .note{font-size:11px;color:var(--faint);margin-top:4px;}

.priority-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;color:var(--muted);}
.priority-item:last-child{border-bottom:none;}
.priority-item .num{color:var(--green);font-family:'IBM Plex Mono',monospace;flex-shrink:0;}

.live-tag{font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--green);border:1px solid rgba(74,222,128,.3);background:rgba(74,222,128,.08);padding:2px 7px;border-radius:5px;}
.ref-tag{font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);border:1px solid var(--border);padding:2px 7px;border-radius:5px;}

.note-box{font-size:13px;color:var(--muted);line-height:1.65;}
.note-box b{color:var(--text);}
.chips-row{display:flex;gap:8px;flex-wrap:wrap;}

@media (max-width:760px){
  .app{flex-direction:column;}
  .sidebar{width:100%;flex-direction:row;overflow-x:auto;padding:10px;}
  .sidebar-head,.sidebar-foot{display:none;}
  nav{display:flex;padding:0;}
  .nav-btn{white-space:nowrap;}
  main{padding:18px;}
}

/* AGENT LAUNCHER */
.agent-launcher{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px;margin-bottom:18px;}
.agent-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;}
.agent-card .agent-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.agent-card .agent-id{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--faint);background:var(--border);padding:3px 8px;border-radius:5px;}
.agent-card .agent-name{font-weight:600;font-size:13px;color:var(--text);}
.agent-card .agent-desc{font-size:11.5px;color:var(--muted);margin-bottom:14px;line-height:1.5;}
.agent-form label{font-size:11px;color:var(--faint);display:block;margin-bottom:3px;letter-spacing:.03em;}
.agent-form select,.agent-form input,.agent-form textarea{
  width:100%;background:var(--void);border:1px solid var(--border);border-radius:6px;
  color:var(--text);padding:7px 10px;font-family:inherit;font-size:12px;margin-bottom:8px;
}
.agent-form textarea{resize:vertical;min-height:60px;}
.agent-form select:focus,.agent-form input:focus,.agent-form textarea:focus{outline:none;border-color:var(--indigo);}
.run-btn{width:100%;background:var(--indigo);color:#fff;border:none;border-radius:7px;padding:9px;font-size:13px;cursor:pointer;font-weight:500;margin-top:4px;}
.run-btn:disabled{opacity:.5;cursor:not-allowed;}
.agent-result{margin-top:12px;background:var(--void);border:1px solid var(--border);border-radius:7px;padding:12px;font-size:12px;color:var(--muted);line-height:1.6;white-space:pre-wrap;display:none;max-height:220px;overflow-y:auto;}
.agent-result.visible{display:block;}
.score-bar{height:4px;border-radius:2px;background:var(--border);margin-top:8px;}
.score-fill{height:100%;border-radius:2px;transition:width .4s;}

/* AGENT SUGGESTION CHIPS */
.agent-suggest-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.suggest-chip{display:flex;align-items:center;gap:6px;background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.3);border-radius:7px;padding:5px 10px;font-size:11.5px;color:#a5b4fc;cursor:pointer;}
.suggest-chip:hover{background:rgba(99,102,241,.22);}
.suggest-chip .chip-icon{font-size:12px;}
.quick-links-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
.quick-link-chip{display:inline-block;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:500;background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.25);color:#86efac;cursor:pointer;text-decoration:none;font-family:inherit;}
.quick-link-chip:hover{background:rgba(74,222,128,.2);color:#4ade80;}
</style>
</head>
<body>

<div class="app">

  <aside class="sidebar">
    <div class="sidebar-head">

<script>
// ───────────────────────────────────────────────
const SUPABASE_URL = "https://ricuoztdelapexfpqsux.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_f_z6goLZoPN68j2N71wX6g_r6jNjrJt";
const AGENTS_SERVER = "http://88.218.121.108:8080";
// ───────────────────────────────────────────────

const headers = { apikey: SUPABASE_ANON_KEY, Authorization: "Bearer " + SUPABASE_ANON_KEY };

function esc(s){ if(s==null) return ""; return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function chip(text,color){ return `<span class="chip" style="color:${color};background:${color}1a">${esc(text)}</span>`; }
function liveTag(){ return `<span class="live-tag">live</span>`; }
function refTag(){ return `<span class="ref-tag">справка</span>`; }

function fetchWithTimeout(url, options = {}, ms = 5000) {
  const controller = new AbortController();
  const id = setTimeout(() => controller.abort(), ms);
  return fetch(url, { ...options, signal: controller.signal }).finally(() => clearTimeout(id));
}
async function countOf(table, filter=""){
  try{
    const res = await fetchWithTimeout(`${SUPABASE_URL}/rest/v1/${table}?select=id${filter}`,{headers:{...headers,Prefer:"count=exact"}});
    const range = res.headers.get("content-range");
    return range ? parseInt(range.split("/")[1]||"0",10) : 0;
  }catch(e){ return 0; }
}
async function fetchRows(table, query){
  try{
    const res = await fetchWithTimeout(`${SUPABASE_URL}/rest/v1/${table}?${query}`,{headers});
    return res.ok ? await res.json() : [];
  }catch(e){ return []; }
}
async function checkHealth(){
  try{
    const res = await fetchWithTimeout(`${AGENTS_SERVER}/health/check-all`, {}, 10000);
    return res.ok ? await res.json() : null;
  }catch(e){ return null; }
}

/* ============================================================
   NAVIGATION
   ============================================================ */
const NAV = [
  {id:"dashboard",icon:"⚡",label:"Dashboard"},
  {id:"accounts",icon:"👤",label:"Аккаунты"},

  clients:["Клиенты","White-label агентская модель, CPA-only оплата"],

  launch:["Запуск агентов","Прямой запуск A19–A29 из браузера · результаты сразу в чате"],
  analytics:["Аналитика","Реальная выручка $0 · условия партнёрок — справка, аккаунты не подключены"],
  infra:["Инфраструктура","FirstVDS Амстердам — реально развёрнут и работает"],
  knowledge:["База знаний","Obsidian Vault, синхронизация через n8n каждый час"],
};

document.getElementById("nav").innerHTML = NAV.map(n =>
  `<button class="nav-btn ${n.id==='dashboard'?'active':''}" data-id="${n.id}">
    <span class="icon">${n.icon}</span>${n.label}
  </button>`
).join("");

document.querySelectorAll(".nav-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("sec-"+btn.dataset.id).classList.add("active");
    document.getElementById("page-title").textContent = TITLES[btn.dataset.id][0];
    document.getElementById("page-desc").textContent = TITLES[btn.dataset.id][1];
  });
});

/* ============================================================
   DASHBOARD — живой статус
   ============================================================ */
async function renderDashboard(){
  const health = await checkHealth();

    countOf("accounts"), countOf("videos"), countOf("revenue_events"),

  const supaOk = health && health.supabase === "ok";
  const redisOk = health && health.redis === "ok";

  document.getElementById("sidebar-status").innerHTML =

  document.getElementById("sec-dashboard").innerHTML = `
    <div class="stat-grid">
      <div class="stat"><div class="label">SUPABASE ${liveTag()}</div>
        <div class="value" style="color:${supaOk?'var(--green)':'var(--red)'}">${supaOk?'OK':'ERROR'}</div></div>
      <div class="stat"><div class="label">REDIS ${liveTag()}</div>
        <div class="value" style="color:${redisOk?'var(--green)':'var(--red)'}">${redisOk?'OK':'ERROR'}</div></div>
      <div class="stat"><div class="label">Аккаунты ${liveTag()}</div><div class="value">${accounts}</div></div>
      <div class="stat"><div class="label">Видео ${liveTag()}</div><div class="value">${videos}</div></div>
      <div class="stat"><div class="label">Revenue events ${liveTag()}</div><div class="value">${revenueEvents}</div></div>
      <div class="stat"><div class="label">Записи знаний ${liveTag()}</div><div class="value">${knowledgeCount}</div></div>
    </div>

    <div class="card">
      <div class="card-head"><span class="title">Что дальше</span><span class="right">актуальный приоритет</span></div>
      ${["Получить API ключ Publer ($12/мес) → добавить PUBLER_API_KEY и PUBLER_*_PROFILE_IDS на сервер",
         "Купить готовые aged аккаунты TikTok + Facebook → зарегистрировать в A28 (5–7 дней прогрева)",
         "Зарегистрировать партнёрки (1win, Dr.Cash) → получить affiliate links для Keitaro",
         "Подключить Higgsfield API → запустить A21+A19 пайплайн → первый UGC-ролик через Publer",
         "Запустить A29 Prelanding Generator → создать HTML прелендинг → подключить воронку"]
        .map((t,i)=>`<div class="priority-item"><span class="num">${String(i+1).padStart(2,"0")}</span>${esc(t)}</div>`).join("")}
    </div>

    <div class="card">
      <div class="card-head"><span class="title">Позиционирование</span><span class="right">${refTag()} стратегическая заметка, не измеряемая метрика</span></div>
      <table>
        <tr><th>Фактор</th><th>GeeLark</th><th>Conbersa</th><th>NoimosAI</th><th>UBT OS</th></tr>
        ${[["Claude как оркестратор",0,0,0,1],["Higgsfield видео-генерация",0,0,0,1],
           ["Direction-based workflow",0,0,0,1],["Obsidian как персистентная память",0,0,0,1],
           ["Человек одобряет ключевые действия",0,0,0,1]]
          .map(([f,a,b,c,d])=>`<tr><td class="primary">${f}</td>
            <td>${a?"✓":"—"}</td><td>${b?"✓":"—"}</td><td>${c?"✓":"—"}</td>
            <td style="color:var(--green)">${d?"✓":"—"}</td></tr>`).join("")}
      </table>

/* ============================================================
   ACCOUNTS
   ============================================================ */
let _acctFilter = "all";
async function renderAccounts(){
  const accounts = await fetchRows("accounts", "select=id,platform,status,proxy,publer_profile_id,created_at&order=created_at.desc&limit=50");
  const tiktok   = accounts.filter(a=>a.platform==="tiktok");
  const facebook = accounts.filter(a=>a.platform==="facebook");
  const instagram= accounts.filter(a=>a.platform==="instagram");

  function acctTable(rows, cols){
    if(!rows.length) return `<div class="note-box" style="padding:10px 0;">Нет аккаунтов этой платформы — добавь через форму ниже.</div>`;
    return `<table><tr>${cols.map(c=>`<th>${c[1]}</th>`).join("")}</tr>${
      rows.map(r=>`<tr>${cols.map(c=>`<td class="${c[2]||''}">${esc(r[c[0]]||"—")}</td>`).join("")}</tr>`).join("")
    }</table>`;
  }

  const tabs = [["all","Все","#94a3b8"],["tiktok","TikTok","#f87171"],["facebook","Facebook","#6366f1"],["instagram","Instagram","#f472b6"]];

  document.getElementById("sec-accounts").innerHTML = `
    <!-- Platform tabs -->
    <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;">
      ${tabs.map(([id,label,color])=>`
        <button onclick="filterAccts('${id}')" id="acct-tab-${id}"
          style="padding:7px 16px;border-radius:7px;border:1px solid ${_acctFilter===id?color:'var(--border)'};
                 background:${_acctFilter===id?color+'22':'transparent'};color:${_acctFilter===id?color:'var(--faint)'};
                 cursor:pointer;font-size:12px;font-family:inherit;">
          ${label} <span style="font-size:10px;opacity:.7">${id==='all'?accounts.length:id==='tiktok'?tiktok.length:id==='facebook'?facebook.length:instagram.length}</span>
        </button>`).join("")}
    </div>

    <!-- TikTok -->
    <div class="card" id="acct-sec-tiktok" style="${_acctFilter!=='all'&&_acctFilter!=='tiktok'?'display:none':''}">
      <div class="card-head"><span class="title">TikTok аккаунты</span><span class="right">${liveTag()} ${tiktok.length}</span></div>
      ${acctTable(tiktok,[["id","ID аккаунта","primary mono"],["status","Статус"],["proxy","Прокси","mono"],["publer_profile_id","Publer ID","mono"],["created_at","Создан","mono"]])}
    </div>

    <!-- Facebook -->
    <div class="card" id="acct-sec-facebook" style="${_acctFilter!=='all'&&_acctFilter!=='facebook'?'display:none':''}">

      ${acctTable(facebook,[["id","ID страницы","primary mono"],["status","Статус"],["proxy","Прокси","mono"],["publer_profile_id","Publer ID","mono"],["created_at","Добавлен","mono"]])}
      <div style="margin-top:12px;font-size:12px;color:var(--faint);">
        ℹ️ Facebook Pages регистрируются через <b style="color:var(--muted)">Meta Graph API</b> (бесплатно) + <b style="color:var(--muted)">Publer</b> для публикации.
        Покупай готовые Farm-аккаунты с уже верифицированными Pages.
      </div>
    </div>

    <!-- Instagram -->
    <div class="card" id="acct-sec-instagram" style="${_acctFilter!=='all'&&_acctFilter!=='instagram'?'display:none':''}">
      <div class="card-head"><span class="title">Instagram аккаунты</span><span class="right">${liveTag()} ${instagram.length}</span></div>
      ${acctTable(instagram,[["id","ID аккаунта","primary mono"],["status","Статус"],["proxy","Прокси","mono"],["publer_profile_id","Publer ID","mono"],["created_at","Добавлен","mono"]])}
    </div>

    <!-- Warmup protocols -->
    <div class="card">
      <div class="card-head"><span class="title">Протокол прогрева — купленные аккаунты (aged)</span><span class="right">${refTag()} A28 WarmupManager</span></div>
      <table><tr><th>День</th><th>TikTok (aged, 7 дней)</th><th>Facebook (aged, 5 дней)</th></tr>
        <tr><td class="primary">1</td><td>Скролль FYP 20–30 мин. Только просмотры.</td><td>Просмотр ленты, лайки (10–15). Без постов.</td></tr>

async function addAccount(){
  const id       = document.getElementById("add-acct-id")?.value?.trim();
  const platform = document.getElementById("add-acct-platform")?.value;
  const proxy    = document.getElementById("add-acct-proxy")?.value?.trim() || null;
  const publer   = document.getElementById("add-acct-publer")?.value?.trim() || null;
  const geo      = document.getElementById("add-acct-geo")?.value;
  const acctType = document.getElementById("add-acct-type")?.value;
  const doWarmup = document.getElementById("add-acct-warmup")?.checked;
  const msgEl    = document.getElementById("add-acct-msg");

  if(!id){ if(msgEl) msgEl.innerHTML = `<span style="color:var(--red)">Укажи ID аккаунта</span>`; return; }

  if(msgEl) msgEl.innerHTML = `<span style="color:var(--faint)">Сохраняю…</span>`;

  try{
    const res = await fetchWithTimeout(`${SUPABASE_URL}/rest/v1/accounts`, {
      method: "POST",
      headers: {
        ...headers,
        "Content-Type": "application/json",
        "Prefer": "return=minimal",
      },
      body: JSON.stringify({
        id, platform, status: "new",
        proxy: proxy || null,
        publer_profile_id: publer || null,
      }),
    }, 10000);

    if(!res.ok){
      const err = await res.text();
      throw new Error(err);
    }

    if(msgEl) msgEl.innerHTML = `<span style="color:var(--green)">✅ Добавлен</span>`;

    // Запуск прогрева A28
    if(doWarmup){
      if(msgEl) msgEl.innerHTML = `<span style="color:var(--faint)">Регистрирую в A28…</span>`;
      await fetchWithTimeout(`${AGENTS_SERVER}/agents/run`, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({agent:"warmup_manager", params:{
          action:"register", account_id:id,
          geo, account_type:acctType, platform,
          proxy_type: proxy ? proxy.split(":")[0] : "none",
        }}),
      }, 15000);
      if(msgEl) msgEl.innerHTML = `<span style="color:var(--green)">✅ Добавлен + прогрев запущен</span>`;
    }

    // Очищаем поля и перезагружаем таблицу
    ["add-acct-id","add-acct-proxy","add-acct-publer"].forEach(fid=>{
      const el = document.getElementById(fid); if(el) el.value="";
    });
    await renderAccounts();
  }catch(e){
    if(msgEl) msgEl.innerHTML = `<span style="color:var(--red)">Ошибка: ${esc(e.message)}</span>`;
  }
}

function switchAcctTab(tab){
  const isSingle = tab === "single";
  document.getElementById("acct-form-single").style.display = isSingle ? "" : "none";

  if(btnSingle && btnBulk){

    btnSingle.style.border     = isSingle ? "1px solid var(--indigo)" : "1px solid var(--border)";
    btnBulk.style.background   = isSingle ? "transparent" : "var(--indigo)";

    btnBulk.style.border       = isSingle ? "1px solid var(--border)" : "1px solid var(--indigo)";
  }
}

async function bulkImportAccounts(){
  const raw     = (document.getElementById("bulk-csv")?.value || "").trim();
  const doWarmup = document.getElementById("bulk-warmup")?.checked;
  const msgEl   = document.getElementById("bulk-msg");
  const progEl  = document.getElementById("bulk-progress");

  const VALID_PLATFORMS = ["tiktok","facebook","instagram","pinterest"];
  const VALID_GEOS      = ["US","BR","MX","DE","PL","TR","IN","NG"];

  if(!raw){ if(msgEl) msgEl.innerHTML = `<span style="color:var(--red)">Вставь данные в поле</span>`; return; }

  const lines = raw.split("\n").map(l=>l.trim()).filter(l=>l && !l.startsWith("#"));
  const records = [];
  const errors  = [];

  for(let i=0;i<lines.length;i++){
    const parts = lines[i].split(",").map(p=>p.trim());
    const [id="",platform="",geo="US",proxy="",publer_id="",type="aged"] = parts;
    if(!id){ errors.push(`Строка ${i+1}: пустой ID`); continue; }
    if(!VALID_PLATFORMS.includes(platform.toLowerCase())){ errors.push(`Строка ${i+1}: неверная платформа "${platform}"`); continue; }
    records.push({
      id,
      platform: platform.toLowerCase(),
      geo: (VALID_GEOS.includes(geo.toUpperCase()) ? geo.toUpperCase() : "US"),
      proxy: proxy || null,
      publer_profile_id: publer_id || null,
      account_type: type || "aged",
      status: "new",
    });
  }

  if(errors.length){
    if(progEl) progEl.innerHTML = errors.map(e=>`<div style="color:var(--red);font-size:11px;">${esc(e)}</div>`).join("");
  }
  if(!records.length){ if(msgEl) msgEl.innerHTML = `<span style="color:var(--red)">Нет корректных строк</span>`; return; }

  if(msgEl) msgEl.innerHTML = `<span style="color:var(--faint)">Загружаю ${records.length} аккаунтов…</span>`;
  if(progEl && !errors.length) progEl.innerHTML = "";

  try{
    // Batch insert в Supabase
    const res = await fetchWithTimeout(`${SUPABASE_URL}/rest/v1/accounts`, {
      method: "POST",
      headers: {
        ...headers,
        "Content-Type": "application/json",
        "Prefer": "return=minimal,resolution=ignore-duplicates",
      },
      body: JSON.stringify(records),
    }, 20000);

    if(!res.ok){ const err = await res.text(); throw new Error(err); }

    if(msgEl) msgEl.innerHTML = `<span style="color:var(--green)">✅ Загружено ${records.length} аккаунтов</span>`;

    // Warmup A28 для каждого аккаунта
    if(doWarmup){
      if(progEl) progEl.innerHTML = `<div style="font-size:11px;color:var(--faint);">Регистрирую в A28 (0/${records.length})…</div>`;
      let done = 0;
      for(const r of records){
        try{
          await fetchWithTimeout(`${AGENTS_SERVER}/agents/run`, {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({agent:"warmup_manager", params:{
              action:"register", account_id:r.id,
              geo:r.geo, account_type:r.account_type, platform:r.platform,
              proxy_type: r.proxy ? r.proxy.split(":")[0] : "none",
            }}),
          }, 15000);
        }catch(_){}
        done++;
        if(progEl) progEl.innerHTML = `<div style="font-size:11px;color:var(--faint);">A28 прогрев: ${done}/${records.length}</div>`;
      }
      if(msgEl) msgEl.innerHTML = `<span style="color:var(--green)">✅ ${records.length} аккаунтов + прогрев A28 запущен</span>`;
      if(progEl) progEl.innerHTML = "";
    }

    document.getElementById("bulk-csv").value = "";
    await renderAccounts();
  }catch(e){
    if(msgEl) msgEl.innerHTML = `<span style="color:var(--red)">Ошибка: ${esc(e.message)}</span>`;
  }
}

          style="flex:1;background:var(--void);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px;font-family:inherit;font-size:13px;resize:vertical;"></textarea>
        <button id="chat-send" onclick="sendChatMessage()"
          style="background:var(--indigo);color:#fff;border:none;border-radius:8px;padding:0 18px;font-size:13px;cursor:pointer;">Отправить</button>
      </div>
    </div>
  `;
  const log = document.getElementById("chat-log");
  if(log) log.scrollTop = log.scrollHeight;
}

function renderChatMsg(m){
  const isUser = m.role === "user";
  return `<div style="align-self:${isUser?'flex-end':'flex-start'};max-width:80%;background:${isUser?'var(--indigo)':'var(--surface2)'};
    border:1px solid var(--border);border-radius:10px;padding:8px 12px;font-size:13px;color:${isUser?'#fff':'var(--text)'};">
    ${esc(m.content)}
  </div>`;
}

async function sendChatMessage(){
  const input = document.getElementById("chat-input");
  const btn = document.getElementById("chat-send");
  const message = input.value.trim();
  if(!message || !CURRENT_PROJECT) return;

  const log = document.getElementById("chat-log");
  log.insertAdjacentHTML("beforeend", renderChatMsg({role:"user", content:message}));
  log.scrollTop = log.scrollHeight;
  input.value = "";
  btn.disabled = true;
  btn.textContent = "Думаю…";

  try{
    const res = await fetchWithTimeout(`${AGENTS_SERVER}/orchestrator/chat`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({vertical_id: CURRENT_PROJECT, message}),
    }, 120000);
    const data = await res.json();

    log.insertAdjacentHTML("beforeend", renderChatMsg({role:"assistant", content: data.reply || data.error || "Ошибка ответа"}));

    // Показываем подсказки агентов если оркестратор их предложил
    const agentLabels = {
      content_creator:"A21 content_creator", text_humanizer:"A19 text_humanizer",
      trend_scraper:"A20 trend_scraper", ads_auditor:"A22 ads_auditor",
      youtube_creator:"A23 youtube_creator", obsidian_brain:"A24 obsidian_brain",
      compliance_gate:"A25 compliance_gate", publer_publisher:"A26 publer_publisher",
      spy_analyzer:"A27 spy_analyzer", warmup_manager:"A28 warmup_manager",
      prelanding_generator:"A29 prelanding_generator", higgsfield_agent:"A30 higgsfield",
    };
    if(data.agent_suggestions && data.agent_suggestions.length > 0){
      const chipsHtml = data.agent_suggestions.map(s => {
        const label = agentLabels[s.agent] || s.agent;
        return `<div class="suggest-chip" onclick="goToLaunch('${esc(s.agent)}')">
          <span class="chip-icon">▶</span>
          <span><b>${esc(label)}</b><br><span style="font-size:10.5px;color:var(--faint)">${esc(s.description)}</span></span>
        </div>`;
      }).join("");
      log.insertAdjacentHTML("beforeend",
        `<div class="agent-suggest-row">${chipsHtml}</div>`);
    }
    // Показываем быстрые ссылки (quick_links) если оркестратор их предложил
    if(data.quick_links && data.quick_links.length > 0){
      const linkChips = data.quick_links.map(ql => {
        const isAgent = Object.keys(agentLabels).includes(ql.url.replace(/^agent:/, ""));
        if(ql.url.startsWith("agent:")){
          const agentId = ql.url.replace("agent:", "");
          return `<button class="quick-link-chip" onclick="goToLaunch('${esc(agentId)}')">↗ ${esc(ql.label)}</button>`;
        }
        return `<a class="quick-link-chip" href="${esc(ql.url)}" target="_blank" rel="noopener">↗ ${esc(ql.label)}</a>`;
      }).join("");
      log.insertAdjacentHTML("beforeend",
        `<div class="quick-links-row">${linkChips}</div>`);
    }
  }catch(e){
    log.insertAdjacentHTML("beforeend", renderChatMsg({role:"assistant", content:"⚠️ Не удалось связаться с оркестратором: "+e.message}));
  }
  log.scrollTop = log.scrollHeight;
  btn.disabled = false;
  btn.textContent = "Отправить";
}

function goToLaunch(agentId){
  // Переключаемся на вкладку "Запуск агентов"
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  const btn = document.querySelector(".nav-btn[data-id='launch']");
  if(btn) btn.classList.add("active");
  document.getElementById("sec-launch").classList.add("active");
  document.getElementById("page-title").textContent = TITLES["launch"][0];
  document.getElementById("page-desc").textContent = TITLES["launch"][1];
  // Скролл к карточке нужного агента
  setTimeout(() => {
    const cards = document.querySelectorAll(".agent-card");
    const agentMap = {
      content_creator:0, text_humanizer:1, trend_scraper:2, ads_auditor:3,
      youtube_creator:4, obsidian_brain:5, compliance_gate:6, publer_publisher:7,
      spy_analyzer:8, warmup_manager:9, prelanding_generator:10, higgsfield_agent:11,
    };
    const idx = agentMap[agentId] ?? 0;
    if(cards[idx]) cards[idx].scrollIntoView({behavior:"smooth", block:"center"});
  }, 100);
}

function toggleA24(){
  const action = document.getElementById("a24-action").value;
  document.getElementById("a24-query-block").style.display = action === "query" ? "" : "none";
  document.getElementById("a24-ingest-block").style.display = action === "ingest" ? "" : "none";
}

function runA24(){
  const action = document.getElementById("a24-action").value;
  const params = {action};
  if(action === "query")  { params.question = v("a24-question"); }
  if(action === "ingest") { params.text = v("a24-text"); params.source_name = v("a24-source") || "dashboard"; }
  runAgent("obsidian_brain", params, "a24-result");
}

function runA27(event){
  const raw = v("a27-creatives");
  const creatives = raw.split(/\n---\n|\n{2,}/).map(s=>s.trim()).filter(Boolean);
  runAgent("spy_analyzer", {
    creatives,
    vertical: v("a27-vertical"),
    geo: v("a27-geo"),
    platform: v("a27-platform"),
    focus: "all",
  }, "a27-result", event);
}

function toggleA28(){
  const action = document.getElementById("a28-action").value;
  document.getElementById("a28-register-block").style.display =
    (action === "register" || action === "validate_infra") ? "" : "none";
}

function runA28(event){
  const action = v("a28-action");
  const account_id = v("a28-account-id");
  const params = {action, account_id};
  if(action === "register" || action === "validate_infra"){
    params.geo = v("a28-geo");
    params.account_type = v("a28-account-type");
    params.device_type = v("a28-device").replace(/ .*/,"");
    params.proxy_type = v("a28-proxy").replace(/ .*/,"");
    params.has_local_sim = document.getElementById("a28-sim")?.checked || false;
  }
  runAgent("warmup_manager", params, "a28-result", event);
}

function runA29(event){
  const benefits = v("a29-benefits").split("\n").map(s=>s.trim()).filter(Boolean);
  runAgent("prelanding_generator", {
    offer_name: v("a29-offer") || "Product",
    vertical: v("a29-vertical"),
    geo: v("a29-geo"),
    billing_model: v("a29-billing"),
    format: v("a29-format"),
    product_benefits: benefits,
    lander_url: v("a29-lander") || "LANDER_URL",
  }, "a29-result", event);
}

function toggleA30(){
  const fmt = document.getElementById("a30-format")?.value;
  const isCarousel = fmt === "carousel";
  const vb = document.getElementById("a30-video-block");
  const cb = document.getElementById("a30-carousel-block");
  if(vb) vb.style.display = isCarousel ? "none" : "";
  if(cb) cb.style.display = isCarousel ? "" : "none";
}

function runA30(event){
  const fmt = v("a30-format");
  if(fmt === "carousel"){
    const benefits = v("a30-carousel-benefits").split("\n").map(s=>s.trim()).filter(Boolean);
    runAgent("higgsfield_agent", {
      format: "carousel",
      offer_name: v("a30-offer") || "Product",
      benefits,
      carousel_style: v("a30-carousel-style"),
      slide_count: parseInt(v("a30-slide-count")) || 5,
      aspect_ratio: v("a30-aspect"),
      vertical: "white",
    }, "a30-result", event);
  } else {
    runAgent("higgsfield_agent", {
      format: fmt,
      hook: v("a30-hook"),
      story: v("a30-story"),
      cta: v("a30-cta"),
      vertical: v("a30-vertical"),
      geo: v("a30-geo"),
      avatar_style: v("a30-avatar"),
      aspect_ratio: v("a30-aspect-video") || "9:16",
    }, "a30-result", event);
  }
}

function v(id){ const el = document.getElementById(id); return el ? el.value : ""; }

function copyHtml(btn){
  const pre = btn.closest("div").querySelector("pre");
  if(!pre) return;
  navigator.clipboard.writeText(pre.textContent).then(()=>{
    const orig = btn.textContent; btn.textContent = "Скопировано ✓";
    setTimeout(()=>{ btn.textContent = orig; }, 1500);
  });
}

function copyResult(btn){
  const box = btn.closest(".agent-result");
  const text = box.innerText.replace("Скопировать\n","").trim();
  navigator.clipboard.writeText(text).then(()=>{
    const orig = btn.textContent; btn.textContent = "Скопировано ✓";
    setTimeout(()=>{ btn.textContent = orig; }, 1500);
  });
}

          ${data.slides.map(s => s.url
            ? `<div style="border:1px solid var(--border);border-radius:8px;overflow:hidden;">
                 <img src="${esc(s.url)}" style="width:100%;display:block;aspect-ratio:1/1;object-fit:cover;" loading="lazy" onerror="this.style.display='none'">
                 <div style="padding:6px 8px;">
                   <div style="font-size:10px;color:var(--faint);margin-bottom:2px;">Слайд ${s.slide_num}</div>
                   <div style="font-size:11px;font-weight:600;color:var(--text);line-height:1.3;">${esc(s.headline||"")}</div>
                   ${s.caption ? `<div style="font-size:10px;color:var(--muted);margin-top:2px;">${esc(s.caption)}</div>` : ""}
                 </div>
               </div>`
            : `<div style="border:1px dashed var(--border);border-radius:8px;padding:12px;display:flex;align-items:center;justify-content:center;aspect-ratio:1/1;">
                 <span style="font-size:10px;color:var(--faint);text-align:center;">Слайд ${s.slide_num}<br>❌ ошибка</span>
               </div>`
          ).join("")}
        </div>`;
    } else if(data.video_url){
      html = `${copyBtn}
        <div style="margin-bottom:10px;"><b style="color:${statusColor}">${statusLabel}</b></div>
        <video src="${esc(data.video_url)}" controls style="max-width:100%;border-radius:8px;background:#000;" ${data.thumbnail_url?`poster="${esc(data.thumbnail_url)}"`:""}></video>
        <div style="margin-top:8px;font-size:11px;color:var(--faint);">
          ${data.duration_sec ? `Длительность: <b style="color:var(--text)">${data.duration_sec}с</b> · ` : ""}
          ${data.job_id ? `Job ID: <span class="mono">${esc(data.job_id)}</span> · ` : ""}
          <a href="${esc(data.video_url)}" target="_blank" style="color:var(--indigo)">Открыть видео ↗</a>
        </div>
        ${data.prompt_used ? `<div style="margin-top:8px;padding:8px;background:var(--surface2);border-radius:6px;font-size:10px;color:var(--faint);white-space:pre-wrap;">${esc(data.prompt_used)}</div>` : ""}`;
    } else {
      // Pending / dry_run / error state
      html = `${copyBtn}
        <div style="margin-bottom:8px;"><b style="color:${statusColor}">${statusLabel}</b></div>
        ${data.job_id ? `<div style="font-size:11px;color:var(--faint);">Job ID: <span class="mono">${esc(data.job_id)}</span> — проверь статус позже</div>` : ""}
        ${data.error ? `<div style="margin-top:6px;font-size:12px;color:var(--red);">${esc(data.error)}</div>` : ""}
        ${data.prompt_used ? `<div style="margin-top:8px;padding:8px;background:var(--surface2);border-radius:6px;font-size:10px;color:var(--faint);white-space:pre-wrap;">${esc(data.prompt_used)}</div>` : ""}`;
    }

  } else {
    html = `${copyBtn}<pre style="margin:0;font-size:11px;">${esc(JSON.stringify(data, null, 2))}</pre>`;
  }

  resultEl.innerHTML = html;
}

async function runAgent(agent, params, resultId, _event){
  const btn = (_event && (_event.currentTarget || _event.target)) || (typeof event !== "undefined" && (event.currentTarget || event.target));
  const origText = btn.textContent;
  const resultEl = document.getElementById(resultId);
  btn.disabled = true;
  btn.textContent = "⏳ Работает…";
  resultEl.className = "agent-result visible";
  resultEl.innerHTML = `<span style="color:var(--faint)">Запрос к агенту…</span>`;

  try{
    const res = await fetchWithTimeout(`${AGENTS_SERVER}/agents/run`, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({agent, params}),
    }, 120000);
    const data = await res.json();
    renderAgentResult(resultEl, agent, params, data);
  }catch(e){
    resultEl.innerHTML = `<span style="color:var(--red)">⚠️ Нет соединения с сервером: ${esc(e.message)}</span>`;
  }

  btn.disabled = false;
  btn.textContent = origText;
}

/* ============================================================
   INIT
   ============================================================ */
async function loadAll(){
  await renderDashboard();
  await renderAccounts();
  await renderContent();
  renderPipeline();
  if (!CURRENT_PROJECT) { renderClients(); }
  renderAgents();
  renderLaunch();
  await renderAnalytics();
  renderInfra();
  renderKnowledge();
}
loadAll();
setInterval(loadAll, 60000);
</script>
