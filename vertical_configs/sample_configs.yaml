# ─────────────────────────────────────────────────────────
# vertical_configs/cars_korea.yaml
# ─────────────────────────────────────────────────────────
vertical:
  id: cars_korea
  name: "Авто из Кореи"
  category: ecommerce
  status: active

audience:
  geo: ["RU", "KZ", "BY"]
  language: ["ru"]
  age_range: "28-48"
  gender: male
  pain_points:
    - "непонятно как растаможить"
    - "боятся нарваться на мошенников"
    - "дилеры задирают цены"

content:
  tone: "экспертный, как от человека который сам прошёл путь"
  first_15_sec_rule: "показать боль — не называть цену"
  cta_style: "мягкий — консультация, не покупка"
  forbidden_words: ["гарантия", "дёшево", "лучшее"]
  hook_patterns:
    - "Я купил Kia из Кореи. Вот что случилось"
    - "Разница с дилером — 800,000₽. Объясняю"
    - "3 ошибки при растаможке — я все совершил"

formats:
  primary:
    - name: story_buyer
      duration_sec: 45
      visual_style: ugc
  secondary:
    - name: fact_comparison
      duration_sec: 25
      visual_style: cinematic

platforms:
  allowed: ["tiktok", "youtube", "instagram", "telegram"]
  primary: youtube
  tiktok_sensitivity: low

monetization:
  model: lead_generation
  funnel_type: full
  funnel:
    prelanding_template: expert_review
    form_fields: ["name", "phone", "city", "budget", "model_interest"]
    crm: bitrix24
    cta_button: "Получить консультацию бесплатно"

seo:
  seed_keywords: ["авто из Кореи", "Kia б/у", "растаможка 2025", "авто пригон"]
  hashtags_tiktok: ["#автоизкореи", "#растаможка", "#kia"]

