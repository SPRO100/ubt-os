# ─────────────────────────────────────────────────────────
# vertical_configs/infoproducts.yaml
# ─────────────────────────────────────────────────────────
vertical:
  id: infoproducts_marketing
  name: "Онлайн-курсы по маркетингу"
  category: infoproduct
  status: active

audience:
  geo: ["RU", "KZ", "UA"]
  language: ["ru"]
  age_range: "20-40"
  gender: any
  pain_points:
    - "работают на нелюбимой работе"
    - "хотят зарабатывать онлайн но не знают как"
    - "боятся потратить деньги на бесполезный курс"

content:
  tone: "вдохновляющий, честный — показываем результаты без хайпа"
  first_15_sec_rule: "трансформация героя — было / стало"
  cta_style: "бесплатный первый шаг — вебинар или PDF"
  forbidden_words: ["гарантирую заработок", "пассивный доход", "без вложений"]
  hook_patterns:
    - "Я бросил офис 2 года назад. Вот цифры сейчас"
    - "Почему 90% курсов не работают (я проверил)"
    - "С нуля до 150,000₽/мес за 6 месяцев — мой путь"

platforms:
  allowed: ["youtube", "instagram", "telegram"]
  primary: youtube
  tiktok_sensitivity: medium

monetization:
  model: direct_sales
  funnel_type: full
  funnel:
    prelanding_template: case_study
    form_fields: ["name", "email", "phone", "experience_level"]
    crm: amocrm
    cta_button: "Записаться на бесплатный вебинар"
    auto_reply: telegram_bot

seo:
  seed_keywords: ["онлайн курсы маркетинг", "заработок в интернете", "smm обучение"]
  hashtags_tiktok: ["#онлайнкурсы", "#маркетинг", "#заработоконлайн"]

