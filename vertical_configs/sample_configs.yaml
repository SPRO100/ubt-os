# vertical_configs/realestate.yaml
# ─────────────────────────────────────────────────────────
vertical:
  id: realestate_dubai
  name: "Недвижимость в Дубае"
  category: realestate
  status: active

audience:
  geo: ["RU", "KZ", "UA", "BY"]
  language: ["ru"]
  age_range: "30-55"
  gender: any
  pain_points:
    - "не знают как купить за рубежом"
    - "боятся юридических рисков"
    - "ищут куда вложить капитал"

content:
  tone: "экспертный, спокойный — цифры и факты"
  first_15_sec_rule: "конкретная цифра доходности или факт"
  cta_style: "консультация с экспертом"
  forbidden_words: ["100% доход", "гарантированная прибыль"]
  hook_patterns:
    - "Апартаменты в Дубае от $150,000. Разбираю варианты"
    - "Почему россияне массово покупают жильё в ОАЭ"
    - "Мой клиент купил студию — вот его доходность"

platforms:
  allowed: ["youtube", "telegram", "instagram"]
  primary: youtube
  tiktok_sensitivity: low

monetization:
  model: lead_generation
  funnel_type: full
  funnel:
    prelanding_template: expert_review
    form_fields: ["name", "phone", "budget", "purpose"]
    crm: bitrix24
    cta_button: "Получить подборку объектов"

seo:
  seed_keywords: ["недвижимость Дубай", "купить квартиру ОАЭ", "инвестиции дубай"]
  hashtags_tiktok: ["#недвижимость", "#дубай", "#инвестиции"]

