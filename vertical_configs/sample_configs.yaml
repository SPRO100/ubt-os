# ─────────────────────────────────────────────────────────
# vertical_configs/crypto_education.yaml
# ─────────────────────────────────────────────────────────
vertical:
  id: crypto_education
  name: "Крипто — обучение и биржи"
  category: crypto
  status: active

audience:
  geo: ["RU", "KZ", "UA"]
  language: ["ru"]
  age_range: "22-40"
  gender: male
  pain_points:
    - "боятся потерять деньги"
    - "не понимают как начать безопасно"
    - "видели как другие заработали и хотят тоже"

content:
  tone: "образовательный, без хайпа и pump-схем"
  first_15_sec_rule: "образовательный факт или история — не обещания дохода"
  cta_style: "регистрация на бирже (партнёрская ссылка)"
  forbidden_words: ["сделай ×10", "гарантированный профит", "инсайд"]
  hook_patterns:
    - "Bitcoin в 2015 стоил $200. Почему я не купил"
    - "3 ошибки новичка в крипте — я их все делал"
    - "Как работает биржа — объясняю за 30 секунд"

platforms:
  allowed: ["youtube", "telegram"]
  primary: youtube
  tiktok_sensitivity: high   # крипта часто режется
  instagram_sensitivity: high

monetization:
  model: affiliate_cpa
  funnel_type: prelanding
  affiliate:
    network: "bybit_partners"
    tracking_url: "https://partner.bybit.com/..."
    cookie_days: 30
    event: "first_deposit"

seo:
  seed_keywords: ["крипта для начинающих", "bitcoin 2025", "bybit обучение"]
  hashtags_tiktok: ["#крипта", "#bitcoin", "#трейдинг"]
