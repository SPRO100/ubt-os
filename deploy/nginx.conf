# ─────────────────────────────────────────────────────────────────────────────
# UBT OS — nginx reverse proxy
#
# Работает как сервис docker-compose (bridge-сеть ubt-os_default) —
# бэкенд резолвится по имени контейнера agents:8080, не по 127.0.0.1.
# Подключается в docker-compose.yml:
#   volumes:
#     - ./dashboard-static:/usr/share/nginx/html:ro
#     - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
#
# n8n (:5678) отдельный контейнер вне этого docker-compose — доступен напрямую
# по порту, через nginx не проксируется.
# ─────────────────────────────────────────────────────────────────────────────

limit_req_zone $binary_remote_addr zone=agents:10m rate=30r/m;

server {
    listen 80;

    gzip on;
    gzip_types text/html text/css application/javascript application/json;
    gzip_min_length 1024;

    add_header X-Frame-Options       SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy       strict-origin-when-cross-origin;

    # ── UBT Agents API ───────────────────────────────────────────────────────
    # Полный список реальных маршрутов main.py (routes-словарь + GET-роуты).
    # Без срезания префикса — проксируем URI как есть, proxy_pass без URI-части.
    location ~* ^/(run|strategy|risk|knowledge|obsidian|orchestrator|agents|competitor|publish|transcribe|hooks|trends|caption|tts|analytics|health|metrics)(/|$) {
        limit_req zone=agents burst=10 nodelay;

        proxy_pass http://agents:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

        # Долгие запросы — LLM может думать 120 сек
        proxy_read_timeout    180s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;

        proxy_buffer_size          16k;
        proxy_buffers              8 32k;
        proxy_busy_buffers_size    64k;
    }

    # ── Dashboard (статика React/Vite) ───────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    location ~* \.(js|css|png|ico|svg|woff2?)$ {
        expires 1h;
        add_header Cache-Control "public";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
