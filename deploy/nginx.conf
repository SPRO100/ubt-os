# ─────────────────────────────────────────────────────────────────────────────
# UBT OS — nginx reverse proxy
#
# УСТАНОВКА НА СЕРВЕР:
#   sudo apt install nginx
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/ubt-os
#   sudo ln -s /etc/nginx/sites-available/ubt-os /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# СЕРВИСЫ:
#   http://88.218.121.108/          → Dashboard       :3000
#   http://88.218.121.108/agents/   → UBT Agents API  :8080
#   http://88.218.121.108/n8n/      → n8n automation  :5678
#   http://88.218.121.108/litellm/  → LiteLLM proxy   :4000
#
# КОГДА БУДЕТ ДОМЕН — раскомментируй секцию "DOMAIN CONFIG" ниже
# и запусти: sudo certbot --nginx -d yourdomain.com
# ─────────────────────────────────────────────────────────────────────────────

# ── Глобальные настройки производительности ──────────────────────────────────
upstream dashboard   { server 127.0.0.1:3000; }
upstream agents_api  { server 127.0.0.1:8080; }
upstream n8n         { server 127.0.0.1:5678; keepalive 32; }
upstream litellm     { server 127.0.0.1:4000; }

# ── Rate limiting — защита от злоупотреблений ─────────────────────────────────
limit_req_zone $binary_remote_addr zone=agents:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=api:10m    rate=60r/m;

# ─────────────────────────────────────────────────────────────────────────────
# IP-BASED CONFIG (работает прямо сейчас без домена)
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name 88.218.121.108 _;

    # ── Сжатие ───────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/html text/css application/javascript application/json;
    gzip_min_length 1024;

    # ── Заголовки безопасности ───────────────────────────────────────────────
    add_header X-Frame-Options       SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy       strict-origin-when-cross-origin;

    # ── Dashboard → / ────────────────────────────────────────────────────────
    location / {
        proxy_pass http://dashboard;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;

        # Кэш статики дашборда (HTML/JS/CSS)
        location ~* \.(js|css|png|ico|woff2)$ {
            proxy_pass http://dashboard;
            expires 1h;
            add_header Cache-Control "public";
        }
    }

    # ── UBT Agents API → /agents/ ────────────────────────────────────────────
    location /agents/ {
        limit_req zone=agents burst=10 nodelay;

        proxy_pass http://agents_api/;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Долгие запросы — LLM может думать 120 сек
        proxy_read_timeout    180s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;

        # Буферы для больших ответов (HTML прелендинги, скрипты)
        proxy_buffer_size          16k;
        proxy_buffers              8 32k;
        proxy_busy_buffers_size    64k;
    }

    # ── n8n → /n8n/ ──────────────────────────────────────────────────────────
    location /n8n/ {
        proxy_pass http://n8n/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket — n8n использует для live updates
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    # ── LiteLLM → /litellm/ ──────────────────────────────────────────────────
    location /litellm/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://litellm/;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Streaming ответы (SSE / chunked)
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering           off;
        proxy_cache               off;
        proxy_read_timeout        300s;
    }

    # ── Скрыть внутренние порты ──────────────────────────────────────────────
    # Блокируем прямой доступ к портам через nginx
    # (порты всё равно надо закрыть в ufw: sudo ufw allow 80 && sudo ufw deny 3000 5678 8080 4000)
}


