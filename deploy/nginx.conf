server {
    listen 80;

    # Статические файлы дашборда
    root /usr/share/nginx/html;
    index index.html;

    # Все API-маршруты агентов — проксируем на внутренний порт 8080
    location ~* ^/(run|accounts|health|projects|risk|knowledge|strategy|obsidian|orchestrator|metrics)(/|$) {
        proxy_pass         http://agents:8080;
        proxy_set_header   Host $host;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Статика
    location / {
        try_files $uri $uri/ /index.html;
    }
}
