  # ── UBT OS v2 — НОВЫЕ СЕРВИСЫ (добавить в docker-compose.yml) ──

  # ── RISK ENGINE (Блок 4) ──────────────────────────────────────
  risk_engine:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    command: ["python", "-m", "ubt_os.core.risk_engine"]
    environment:
      SUPABASE_URL:             ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY:     ${SUPABASE_SERVICE_KEY}
      REDIS_URL:                redis://:${REDIS_PASSWORD}@redis:6379
      TELEGRAM_ALERT_BOT_TOKEN: ${TELEGRAM_ALERT_BOT_TOKEN}
      TELEGRAM_ALERT_CHAT_ID:   ${TELEGRAM_ALERT_CHAT_ID}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    labels:
      - "service=risk_engine"
      - "version=v2"

  # ── FAILURE RECOVERY (Блок 5) ────────────────────────────────
  failure_recovery:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    command: ["python", "-m", "ubt_os.agents.failure_recovery"]
    environment:
      SUPABASE_URL:             ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY:     ${SUPABASE_SERVICE_KEY}
      REDIS_URL:                redis://:${REDIS_PASSWORD}@redis:6379
      LITELLM_BASE_URL:         http://litellm:4000
      LITELLM_MASTER_KEY:       ${LITELLM_MASTER_KEY}
      ANTHROPIC_API_KEY:        ${ANTHROPIC_API_KEY}
      HIGGSFIELD_API_KEY:       ${HIGGSFIELD_API_KEY}
      ELEVENLABS_API_KEY:       ${ELEVENLABS_API_KEY}
      BLOTATO_API_KEY:          ${BLOTATO_API_KEY}
      KEITARO_DOMAIN:           ${KEITARO_DOMAIN}
      KEITARO_API_KEY:          ${KEITARO_API_KEY}
      TIKTOK_UPLOADER_URL:      http://tiktok_uploader:8080
      TELEGRAM_ALERT_BOT_TOKEN: ${TELEGRAM_ALERT_BOT_TOKEN}
      TELEGRAM_ALERT_CHAT_ID:   ${TELEGRAM_ALERT_CHAT_ID}
    depends_on:
      redis:
        condition: service_healthy
    labels:
      - "service=failure_recovery"
      - "version=v2"
