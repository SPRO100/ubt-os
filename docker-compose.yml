version: "3.9"

services:

  # ── БАЗА ДАННЫХ ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ubt_os
      POSTGRES_USER:     ubt_os
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ubt_os"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── REDIS ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── LITELLM ROUTER ────────────────────────────────────────
  litellm:
    image: ghcr.io/berriai/litellm:main
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - ./deploy/litellm_config.yaml:/app/litellm_config.yaml:ro
    environment:
      ANTHROPIC_API_KEY:  ${ANTHROPIC_API_KEY}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      DATABASE_URL:       postgresql://ubt_os:${POSTGRES_PASSWORD}@postgres:5432/ubt_os
    command: ["--config", "/app/litellm_config.yaml", "--port", "4000"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── N8N ОРКЕСТРАТОР ───────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      DB_TYPE:                postgresdb
      DB_POSTGRESDB_HOST:     postgres
      DB_POSTGRESDB_PORT:     5432
      DB_POSTGRESDB_DATABASE: ubt_os
      DB_POSTGRESDB_USER:     ubt_os
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_ENCRYPTION_KEY:     ${N8N_ENCRYPTION_KEY}
      N8N_HOST:               ${N8N_HOST:-localhost}
      N8N_PORT:               5678
      WEBHOOK_URL:            ${N8N_WEBHOOK_URL}
      EXECUTIONS_PROCESS:     main
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/workflows:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── NGINX РЕВЕРС-ПРОКСИ + ДАШБОРД ────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./dashboard-static:/usr/share/nginx/html:ro
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - agents

  # ── UBT OS PYTHON АГЕНТЫ ──────────────────────────────────
  agents:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    environment:
      ANTHROPIC_API_KEY:    ${ANTHROPIC_API_KEY}
      SUPABASE_URL:         ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      REDIS_URL:            redis://:${REDIS_PASSWORD}@redis:6379
      LITELLM_BASE_URL:     http://litellm:4000
      LITELLM_MASTER_KEY:   ${LITELLM_MASTER_KEY}
      LITELLM_DAILY_BUDGET: ${LITELLM_DAILY_BUDGET:-20.0}
      HIGGSFIELD_API_KEY:   ${HIGGSFIELD_API_KEY}
      ELEVENLABS_API_KEY:   ${ELEVENLABS_API_KEY}
      ELEVENLABS_VOICE_ID:  ${ELEVENLABS_VOICE_ID:-}
      BLOTATO_API_KEY:      ${BLOTATO_API_KEY}
      KEITARO_DOMAIN:       ${KEITARO_DOMAIN}
      KEITARO_API_KEY:      ${KEITARO_API_KEY}
      TELEGRAM_ALERT_BOT_TOKEN: ${TELEGRAM_ALERT_BOT_TOKEN}
      TELEGRAM_ALERT_CHAT_ID:   ${TELEGRAM_ALERT_CHAT_ID}
      TELEGRAM_API_ID:      ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH:    ${TELEGRAM_API_HASH}
      OBSIDIAN_VAULT_PATH:  /app/obsidian-vault
      OBSIDIAN_REMOTE_URL:  ${OBSIDIAN_REMOTE_URL}
      N8N_WEBHOOK_URL:      ${N8N_WEBHOOK_URL}
      # Аутентификация webhook-сервера — без этих ключей контейнер работает
      # в dev-режиме и принимает запросы без проверки подписи/токена
      WEBHOOK_SECRET:       ${WEBHOOK_SECRET:-}
      AGENTS_API_TOKEN:     ${AGENTS_API_TOKEN:-}
      CORS_ALLOW_ORIGIN:    ${CORS_ALLOW_ORIGIN:-*}
      # Публикация и внешние API
      PUBLER_API_KEY:              ${PUBLER_API_KEY:-}
      PUBLER_TIKTOK_PROFILE_IDS:   ${PUBLER_TIKTOK_PROFILE_IDS:-}
      PUBLER_FACEBOOK_PROFILE_IDS: ${PUBLER_FACEBOOK_PROFILE_IDS:-}
      PUBLER_INSTAGRAM_PROFILE_IDS: ${PUBLER_INSTAGRAM_PROFILE_IDS:-}
      PUBLER_PINTEREST_PROFILE_IDS: ${PUBLER_PINTEREST_PROFILE_IDS:-}
      PUBLER_PINTEREST_BOARD_IDS:  ${PUBLER_PINTEREST_BOARD_IDS:-}
      FIRECRAWL_API_KEY:    ${FIRECRAWL_API_KEY:-}
      DEEPGRAM_API_KEY:     ${DEEPGRAM_API_KEY:-}
      OPENAI_API_KEY:       ${OPENAI_API_KEY:-}
      MEDIA_BUCKET:         ${MEDIA_BUCKET:-media}
      TTS_SERVER_URL:       ${TTS_SERVER_URL:-}
    volumes:
      - obsidian_vault:/app/obsidian-vault
    depends_on:
      redis:
        condition: service_healthy
      litellm:
        condition: service_healthy

  # ── HIGGSFIELD WORKER (отдельный сервис) ─────────────────
  higgsfield_worker:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    command: ["python", "-m", "ubt_os.pipelines.higgsfield_worker"]
    environment:
      REDIS_URL:            redis://:${REDIS_PASSWORD}@redis:6379
      HIGGSFIELD_API_KEY:   ${HIGGSFIELD_API_KEY}
      SUPABASE_URL:         ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      TELEGRAM_ALERT_BOT_TOKEN: ${TELEGRAM_ALERT_BOT_TOKEN}
      TELEGRAM_ALERT_CHAT_ID:   ${TELEGRAM_ALERT_CHAT_ID}
    depends_on:
      redis:
        condition: service_healthy

  # ── OBSIDIAN SYNC (hourly cron) ───────────────────────────
  obsidian_sync:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    command: ["python", "-m", "ubt_os.utils.obsidian_cron"]
    environment:
      REDIS_URL:           redis://:${REDIS_PASSWORD}@redis:6379
      OBSIDIAN_VAULT_PATH: /app/obsidian-vault
      OBSIDIAN_REMOTE_URL: ${OBSIDIAN_REMOTE_URL}
      OBSIDIAN_BRANCH:     ${OBSIDIAN_BRANCH:-main}
      TELEGRAM_ALERT_BOT_TOKEN: ${TELEGRAM_ALERT_BOT_TOKEN}
      TELEGRAM_ALERT_CHAT_ID:   ${TELEGRAM_ALERT_CHAT_ID}
    volumes:
      - obsidian_vault:/app/obsidian-vault

volumes:
  postgres_data:
  redis_data:
  n8n_data:
  obsidian_vault:
