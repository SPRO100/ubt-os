version: "3.9"

services:

  # ── БАЗА ДАННЫХ ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ubt_os
      POSTGRES_USER:     ubt_os
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ubt_os"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── REDIS ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── LITELLM ROUTER ────────────────────────────────────────
  litellm:
    image: ghcr.io/berriai/litellm:main
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - ./deploy/litellm_config.yaml:/app/litellm_config.yaml:ro
    environment:
      ANTHROPIC_API_KEY:  ${ANTHROPIC_API_KEY}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      DATABASE_URL:       postgresql://ubt_os:${POSTGRES_PASSWORD}@postgres:5432/ubt_os
    command: ["--config", "/app/litellm_config.yaml", "--port", "4000"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── N8N ОРКЕСТРАТОР ───────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      DB_TYPE:                postgresdb
      DB_POSTGRESDB_HOST:     postgres
      DB_POSTGRESDB_PORT:     5432
      DB_POSTGRESDB_DATABASE: ubt_os
      DB_POSTGRESDB_USER:     ubt_os
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_ENCRYPTION_KEY:     ${N8N_ENCRYPTION_KEY}
      N8N_HOST:               ${N8N_HOST:-localhost}
      N8N_PORT:               5678
      WEBHOOK_URL:            ${N8N_WEBHOOK_URL}
      EXECUTIONS_PROCESS:     main
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/workflows:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── NGINX РЕВЕРС-ПРОКСИ + ДАШБОРД ────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./dashboard-static:/usr/share/nginx/html:ro
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - agents

  # ── UBT OS PYTHON АГЕНТЫ ──────────────────────────────────
  agents:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      OBSIDIAN_VAULT_PATH: /app/obsidian-vault
    volumes:
      - obsidian_vault:/app/obsidian-vault

  # ── HIGGSFIELD WORKER (отдельный сервис) ─────────────────
  higgsfield_worker:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    command: ["python", "-m", "ubt_os.pipelines.higgsfield_worker"]
    env_file:
      - .env

  # ── OBSIDIAN SYNC (hourly cron) ───────────────────────────
  obsidian_sync:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    command: ["python", "-m", "ubt_os.utils.obsidian_cron"]
    environment:
      REDIS_URL:           redis://:${REDIS_PASSWORD}@redis:6379
      OBSIDIAN_VAULT_PATH: /app/obsidian-vault
      OBSIDIAN_REMOTE_URL: ${OBSIDIAN_REMOTE_URL}
      OBSIDIAN_BRANCH:     ${OBSIDIAN_BRANCH:-main}
      TELEGRAM_ALERT_BOT_TOKEN: ${TELEGRAM_ALERT_BOT_TOKEN}
      TELEGRAM_ALERT_CHAT_ID:   ${TELEGRAM_ALERT_CHAT_ID}
    volumes:
      - obsidian_vault:/app/obsidian-vault

volumes:
  postgres_data:
  redis_data:
  n8n_data:
  obsidian_vault:
